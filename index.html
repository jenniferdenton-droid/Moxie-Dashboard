<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moxie Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f9fa;
    color: #333;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #EBBA95;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    height: 40px;
    width: auto;
    object-fit: contain;
  }

  .dashboard-title {
    font-size: 22px;
    font-weight: 700;
    color: #4E8D99;
    letter-spacing: -0.3px;
  }

  .header-right {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: #4E8D99;
    color: white;
  }
  .btn-primary:hover { background: #3d7280; transform: translateY(-1px); }

  .btn-secondary {
    background: #EBBA95;
    color: #6D445E;
  }
  .btn-secondary:hover { background: #e0a87a; transform: translateY(-1px); }

  .btn-outline {
    background: white;
    color: #6D445E;
    border: 2px solid #6D445E;
  }
  .btn-outline:hover { background: #6D445E; color: white; }

  /* SEARCH */
  .search-bar {
    padding: 12px 32px;
    background: white;
    border-bottom: 1px solid #eee;
  }

  .search-input {
    width: 100%;
    max-width: 500px;
    padding: 10px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 25px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #4E8D99; }

  /* MAIN CONTENT */
  .main {
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* CATEGORY SECTION */
  .category-section {
    margin-bottom: 36px;
  }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #EBBA95;
  }

  .category-title {
    font-size: 18px;
    font-weight: 700;
    color: #6D445E;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .category-emoji { font-size: 20px; }

  .app-count {
    font-size: 12px;
    color: #999;
    font-weight: 400;
    margin-left: 6px;
  }

  /* APP GRID */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    min-height: 60px;
  }

  .app-grid.drag-over {
    background: rgba(78, 141, 153, 0.05);
    border-radius: 12px;
    outline: 2px dashed #4E8D99;
  }

  /* APP CARD */
  .app-card {
    background: white;
    border-radius: 12px;
    padding: 20px 12px 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    user-select: none;
  }

  .app-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(78,141,153,0.2);
    border-color: #4E8D99;
  }

  .app-card.dragging {
    opacity: 0.5;
    transform: scale(0.95);
  }

  /* APP ICON - KEY FIX */
  .app-icon-wrapper {
    width: 56px;
    height: 56px;
    margin: 0 auto 10px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    flex-shrink: 0;
  }

  .app-icon-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    border: none;
    text-decoration: none;
  }

  .app-icon-emoji {
    font-size: 32px;
    line-height: 1;
  }

  .app-name {
    font-size: 12px;
    font-weight: 600;
    color: #333;
    line-height: 1.3;
    word-break: break-word;
    margin-top: 4px;
  }

  /* CARD ACTION BUTTONS */
  .card-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
    gap: 4px;
  }

  .app-card:hover .card-actions { display: flex; }

  .card-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .card-btn-edit { background: #4E8D99; color: white; }
  .card-btn-edit:hover { background: #3d7280; }
  .card-btn-delete { background: #e74c3c; color: white; }
  .card-btn-delete:hover { background: #c0392b; }

  /* DRAG HANDLE */
  .drag-handle {
    position: absolute;
    top: 6px;
    left: 6px;
    color: #ccc;
    cursor: grab;
    font-size: 12px;
    display: none;
    line-height: 1;
  }
  .app-card:hover .drag-handle { display: block; }
  .drag-handle:active { cursor: grabbing; }

  /* MODAL OVERLAY */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 700;
    color: #6D445E;
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: #4E8D99; }

  /* ICON UPLOAD AREA */
  .icon-upload-area {
    border: 2px dashed #e0e0e0;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafafa;
  }
  .icon-upload-area:hover { border-color: #4E8D99; background: #f0f8f9; }

  .icon-preview-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .icon-preview-box {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #eee;
    background: #f5f5f5;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-preview-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .icon-upload-text {
    font-size: 13px;
    color: #777;
    line-height: 1.4;
  }

  .icon-upload-text strong { color: #4E8D99; }

  .icon-url-input {
    margin-top: 10px;
  }

  #iconFileInput { display: none; }

  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  /* CATEGORY MODAL */
  .category-form-group {
    margin-bottom: 16px;
  }

  /* EDIT CATEGORY */
  .category-edit-btn {
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .category-edit-btn:hover { color: #4E8D99; background: #f0f8f9; }

  /* EMPTY STATE */
  .empty-category {
    color: #bbb;
    font-size: 13px;
    font-style: italic;
    padding: 20px;
    text-align: center;
    border: 2px dashed #eee;
    border-radius: 10px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #4E8D99;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* CONFIRM DIALOG */
  .confirm-dialog {
    background: white;
    border-radius: 12px;
    padding: 24px;
    width: 320px;
    text-align: center;
  }
  .confirm-dialog h3 { font-size: 17px; color: #333; margin-bottom: 8px; }
  .confirm-dialog p { font-size: 13px; color: #777; margin-bottom: 20px; }
  .confirm-buttons { display: flex; gap: 10px; justify-content: center; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #EBBA95; border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .main { padding: 16px; }
    .app-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .dashboard-title { font-size: 18px; }
    .header-right { gap: 6px; }
    .btn { padding: 8px 12px; font-size: 13px; }
  }

  @media (max-width: 480px) {
    .app-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo-area">
      <img class="logo-img" id="moxieLogo" 
        src="https://images.squarespace-cdn.com/content/v1/647f9f5b5dd3c623b2a8d36e/1686076289851-DNEWSUMHH3JCX9C3XBF2/Moxie+MedSpa+Logo.png"
        alt="Moxie"
        onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
      <span id="logoFallback" style="display:none; font-size:26px; font-weight:800; color:#4E8D99; letter-spacing:-0.5px;">Moxie</span>
    </div>
    <div class="dashboard-title">Dashboard</div>
  </div>
  <div class="header-right">
    <button class="btn btn-outline" onclick="openCategoryModal()">+ Category</button>
    <button class="btn btn-secondary" onclick="openAddModal()">+ Add App</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <input class="search-input" type="text" id="searchInput" placeholder="🔍  Search apps..." oninput="filterApps()">
</div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<!-- ADD/EDIT APP MODAL -->
<div class="modal-overlay" id="appModal">
  <div class="modal">
    <h2 id="modalTitle">Add New App</h2>

    <div class="form-group">
      <label>App Name *</label>
      <input type="text" id="appName" placeholder="e.g. Gmail">
    </div>

    <div class="form-group">
      <label>URL *</label>
      <input type="url" id="appUrl" placeholder="https://...">
    </div>

    <div class="form-group">
      <label>Category</label>
      <select id="appCategory"></select>
    </div>

    <div class="form-group">
      <label>Icon</label>
      <div class="icon-upload-area" onclick="document.getElementById('iconFileInput').click()">
        <div class="icon-preview-container">
          <div class="icon-preview-box" id="iconPreviewBox">
            <span style="color:#ccc; font-size:22px;">🖼️</span>
          </div>
          <div class="icon-upload-text">
            <strong>Click to upload image</strong><br>
            PNG, JPG, SVG — or paste a URL below
          </div>
        </div>
        <input type="file" id="iconFileInput" accept="image/*" onchange="handleIconFile(event)">
      </div>
      <div class="icon-url-input">
        <input type="url" id="iconUrl" placeholder="Or paste icon URL (https://...)" 
          oninput="previewIconUrl(this.value)">
      </div>
    </div>

    <div class="modal-buttons">
      <button class="btn btn-outline" onclick="closeModal('appModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveApp()">Save App</button>
    </div>
  </div>
</div>

<!-- ADD CATEGORY MODAL -->
<div class="modal-overlay" id="categoryModal">
  <div class="modal">
    <h2 id="categoryModalTitle">Add New Category</h2>

    <div class="form-group">
      <label>Category Name *</label>
      <input type="text" id="categoryName" placeholder="e.g. Marketing">
    </div>

    <div class="form-group">
      <label>Emoji Icon</label>
      <input type="text" id="categoryEmoji" placeholder="e.g. 📊" maxlength="4">
    </div>

    <div class="modal-buttons">
      <button class="btn btn-outline" onclick="closeModal('categoryModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategory()">Save Category</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="modal-overlay" id="confirmModal">
  <div class="confirm-dialog">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmMessage">This action cannot be undone.</p>
    <div class="confirm-buttons">
      <button class="btn btn-outline" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn btn-primary" id="confirmBtn" style="background:#e74c3c">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA STORE — uses localStorage, key = moxie_dashboard_v2
// ============================================================
const STORAGE_KEY = 'moxie_dashboard_v2';

const DEFAULT_DATA = {
  categories: [
    { id: 'communication', name: 'Communication', emoji: '📬' },
    { id: 'project',       name: 'Project Management', emoji: '📋' },
    { id: 'finance',       name: 'Finance', emoji: '💰' },
    { id: 'sales',         name: 'Sales & CRM', emoji: '🛒' },
    { id: 'operations',    name: 'Operations', emoji: '🔧' },
    { id: 'ai',            name: 'AI Tools', emoji: '🤖' }
  ],
  apps: [
    { id:'gmail',      name:'Gmail',           url:'https://mail.google.com',               icon:'https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg',             category:'communication' },
    { id:'meet',       name:'Google Meet',     url:'https://meet.google.com',               icon:'https://fonts.gstatic.com/s/i/productlogos/meet_2020q4/v1/web-512dp/logo_meet_2020q4_color_2x_web_512dp.png', category:'communication' },
    { id:'slack',      name:'Slack',           url:'https://slack.com',                     icon:'https://upload.wikimedia.org/wikipedia/commons/d/d5/Slack_icon_2019.svg',                    category:'communication' },
    { id:'loom',       name:'Loom',            url:'https://www.loom.com',                  icon:'https://cdn.loom.com/assets/img/loom-logo-1200x630.png',                                     category:'communication' },
    { id:'fathom',     name:'Fathom',          url:'https://fathom.video/home',             icon:'https://fathom.video/favicon.ico',                                                           category:'communication' },
    { id:'gcal',       name:'Google Calendar', url:'https://calendar.google.com',           icon:'https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg',    category:'communication' },
    { id:'notion',     name:'Notion',          url:'https://www.notion.so/moxie-docs/6060ef49fea04dc3a1dc0a32d0564233', icon:'https://upload.wikimedia.org/wikipedia/commons/4/45/Notion_app_logo.png', category:'project' },
    { id:'asana',      name:'Asana',           url:'https://app.asana.com/1/1203386861136560/home', icon:'https://upload.wikimedia.org/wikipedia/commons/3/3b/Asana_logo.svg',                 category:'project' },
    { id:'arrows',     name:'Arrows',          url:'https://success.joinmoxie.com/home',    icon:'https://assets-global.website-files.com/614e2d59ec4e8e52620b8dde/6150dcd8bbcfd7e9e234d24d_favicon-arrows.png', category:'project' },
    { id:'gsheets',    name:'Google Sheets',   url:'https://sheets.google.com',             icon:'https://upload.wikimedia.org/wikipedia/commons/3/30/Google_Sheets_logo_%282014-2020%29.svg', category:'project' },
    { id:'clickup',    name:'ClickUp',         url:'https://app.clickup.com/',              icon:'https://clickup.com/favicon.ico',                                                            category:'project' },
    { id:'ramp',       name:'Ramp',            url:'https://app.ramp.com/sign-in',          icon:'https://ramp.com/favicon.ico',                                                               category:'finance' },
    { id:'stripe',     name:'Stripe',          url:'https://dashboard.stripe.com/register?account_invite=uis_sSEYJeeK7OA10mzCAF69eIyxWICgGRPI', icon:'https://upload.wikimedia.org/wikipedia/commons/b/ba/Stripe_Logo%2C_revised_2016.svg', category:'finance' },
    { id:'justworks',  name:'JustWorks',       url:'https://payroll.justworks.com/account/vouchers', icon:'https://justworks.com/favicon.ico',                                                  category:'finance' },
    { id:'hubspot',    name:'HubSpot',         url:'https://app.hubspot.com/login/?loginRedirectUrl=https%3A%2F%2Fapp.hubspot.com%2Fcontacts%2F22420370%2Fobjects%2F0-1%2Fviews%2Fall%2Flist&loginPortalId=22420370', icon:'https://upload.wikimedia.org/wikipedia/commons/3/3f/HubSpot_Logo.svg', category:'sales' },
    { id:'shopify',    name:'Shopify',         url:'https://admin.shopify.com/store/moxie-9681', icon:'https://upload.wikimedia.org/wikipedia/commons/0/0e/Shopify_logo_2018.svg',             category:'sales' },
    { id:'omni',       name:'Omni',            url:'https://moxie.omniapp.co',              icon:'https://moxie.omniapp.co/favicon.ico',                                                       category:'operations' },
    { id:'glean',      name:'Glean',           url:'https://app.glean.com/?qe=https%3A%2F%2Fjoinmoxie-be.glean.com&utm_source=admin_invite&utm_medium=email&utm_campaign=vanity_v3&skip_to_sso=1&setup=welcome', icon:'https://app.glean.com/favicon.ico', category:'operations' },
    { id:'1password',  name:'1Password',       url:'https://my.1password.com',              icon:'https://1password.com/img/logo-v1.svg',                                                      category:'operations' },
    { id:'dropbox',    name:'Dropbox Sign',    url:'https://app.hellosign.com/account/logIn', icon:'https://upload.wikimedia.org/wikipedia/commons/7/78/Dropbox_Icon.svg',                    category:'operations' },
    { id:'zapier',     name:'Zapier',          url:'https://zapier.com',                    icon:'https://cdn.zapier.com/zapier/images/favicon.ico',                                           category:'operations' },
    { id:'github',     name:'GitHub',          url:'https://github.com',                    icon:'https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg',               category:'operations' },
    { id:'moxieadmin', name:'Moxie Admin',     url:'https://api.prod.internal.joinmoxie.com/admin/login/', icon:'https://joinmoxie.com/favicon.ico',                                            category:'operations' },
    { id:'moxieapp',   name:'Moxie App',       url:'https://app.joinmoxie.com/',            icon:'https://joinmoxie.com/favicon.ico',                                                          category:'operations' },
    { id:'chatgpt',    name:'ChatGPT',         url:'https://chatgpt.com',                   icon:'https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg',                       category:'ai' },
    { id:'notebooklm', name:'NotebookLM',      url:'https://notebooklm.google.com/',        icon:'https://www.gstatic.com/lamda/images/notebooklm_favicon_v1_a41003.png',                     category:'ai' }
  ]
};

// ============================================================
// LOAD / SAVE
// ============================================================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.categories && parsed.apps) return parsed;
    }
  } catch(e) { console.warn('Storage read error, using defaults'); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      showToast('⚠️ Storage full — some icons may not save. Try smaller images.');
    }
  }
}

let data = loadData();

// ============================================================
// RENDER
// ============================================================
function render(filterText = '') {
  const main = document.getElementById('mainContent');
  const query = filterText.toLowerCase().trim();

  let html = '';

  data.categories.forEach(cat => {
    const catApps = data.apps.filter(app => {
      const matchCat = app.category === cat.id;
      const matchSearch = !query || app.name.toLowerCase().includes(query);
      return matchCat && matchSearch;
    });

    // If searching and no results for this category, skip
    if (query && catApps.length === 0) return;

    const emoji = cat.emoji || cat.icon || '📁';

    html += `
      <div class="category-section" id="cat-${cat.id}">
        <div class="category-header">
          <div class="category-title">
            <span class="category-emoji">${emoji}</span>
            ${escHtml(cat.name)}
            <span class="app-count">${catApps.length} app${catApps.length !== 1 ? 's' : ''}</span>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="category-edit-btn" onclick="editCategory('${cat.id}')" title="Edit category">✏️</button>
            <button class="category-edit-btn" onclick="deleteCategory('${cat.id}')" title="Delete category" style="color:#e74c3c;">🗑️</button>
          </div>
        </div>
        <div class="app-grid" id="grid-${cat.id}"
          ondragover="onDragOver(event, '${cat.id}')"
          ondragleave="onDragLeave(event, '${cat.id}')"
          ondrop="onDrop(event, '${cat.id}')">
          ${catApps.length === 0
            ? `<div class="empty-category" style="grid-column:1/-1;">No apps yet — add one above</div>`
            : catApps.map(app => renderAppCard(app)).join('')
          }
        </div>
      </div>`;
  });

  // Uncategorized apps
  const uncatApps = data.apps.filter(app => {
    const catExists = data.categories.some(c => c.id === app.category);
    const matchSearch = !query || app.name.toLowerCase().includes(query);
    return !catExists && matchSearch;
  });

  if (uncatApps.length > 0) {
    html += `
      <div class="category-section">
        <div class="category-header">
          <div class="category-title"><span class="category-emoji">📦</span> Uncategorized</div>
        </div>
        <div class="app-grid">
          ${uncatApps.map(app => renderAppCard(app)).join('')}
        </div>
      </div>`;
  }

  if (!html) {
    html = `<div style="text-align:center;padding:60px;color:#999;">
      <div style="font-size:40px;margin-bottom:12px;">🔍</div>
      <div style="font-size:16px;">No apps match "${escHtml(filterText)}"</div>
    </div>`;
  }

  main.innerHTML = html;
}

function renderAppCard(app) {
  const iconHtml = buildIconHtml(app.icon, app.name);
  return `
    <div class="app-card"
      draggable="true"
      ondragstart="onDragStart(event, '${app.id}')"
      ondragend="onDragEnd(event)"
      onclick="openApp('${app.url}')"
      id="app-${app.id}">
      <div class="drag-handle" onclick="event.stopPropagation()">⠿</div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="card-btn card-btn-edit" onclick="editApp('${app.id}')" title="Edit">✏️</button>
        <button class="card-btn card-btn-delete" onclick="confirmDeleteApp('${app.id}')" title="Delete">✕</button>
      </div>
      <div class="app-icon-wrapper">${iconHtml}</div>
      <div class="app-name">${escHtml(app.name)}</div>
    </div>`;
}

// Build icon — img tag only, no link decorations
function buildIconHtml(iconSrc, appName) {
  if (!iconSrc) {
    // Emoji fallback from first letter
    return `<span class="app-icon-emoji">${getEmojiInitial(appName)}</span>`;
  }
  const fallback = getEmojiInitial(appName);
  return `<img src="${escHtml(iconSrc)}" alt="${escHtml(appName)}" 
    onerror="this.parentElement.innerHTML='<span class=\\'app-icon-emoji\\'>${fallback}</span>'"
    loading="lazy">`;
}

function getEmojiInitial(name) {
  const letter = (name || '?')[0].toUpperCase();
  return `<span style="font-size:24px;font-weight:700;color:#4E8D99;">${letter}</span>`;
}

// ============================================================
// APP OPEN
// ============================================================
function openApp(url) {
  if (url) window.open(url, '_blank');
}

// ============================================================
// SEARCH
// ============================================================
function filterApps() {
  const q = document.getElementById('searchInput').value;
  render(q);
}

// ============================================================
// ADD / EDIT APP MODAL
// ============================================================
let editingAppId = null;

function openAddModal() {
  editingAppId = null;
  document.getElementById('modalTitle').textContent = 'Add New App';
  document.getElementById('appName').value = '';
  document.getElementById('appUrl').value = '';
  document.getElementById('iconUrl').value = '';
  resetIconPreview();
  populateCategorySelect('appCategory', '');
  openModal('appModal');
  setTimeout(() => document.getElementById('appName').focus(), 100);
}

function editApp(appId) {
  const app = data.apps.find(a => a.id === appId);
  if (!app) return;
  editingAppId = appId;
  document.getElementById('modalTitle').textContent = 'Edit App';
  document.getElementById('appName').value = app.name;
  document.getElementById('appUrl').value = app.url;

  // Set icon preview
  if (app.icon) {
    if (app.icon.startsWith('data:')) {
      setIconPreview(app.icon);
      document.getElementById('iconUrl').value = '';
    } else {
      document.getElementById('iconUrl').value = app.icon;
      setIconPreview(app.icon);
    }
  } else {
    resetIconPreview();
    document.getElementById('iconUrl').value = '';
  }

  populateCategorySelect('appCategory', app.category);
  openModal('appModal');
}

function saveApp() {
  const name = document.getElementById('appName').value.trim();
  const url  = document.getElementById('appUrl').value.trim();
  const cat  = document.getElementById('appCategory').value;

  if (!name) { showToast('⚠️ Please enter an app name'); return; }
  if (!url)  { showToast('⚠️ Please enter a URL'); return; }

  // Get icon: prefer file upload (data URI in preview), then URL field
  let icon = '';
  const previewImg = document.querySelector('#iconPreviewBox img');
  if (previewImg && previewImg.src && previewImg.src.startsWith('data:')) {
    icon = previewImg.src;
  } else {
    const urlVal = document.getElementById('iconUrl').value.trim();
    if (urlVal) icon = urlVal;
  }

  if (editingAppId) {
    const idx = data.apps.findIndex(a => a.id === editingAppId);
    if (idx > -1) {
      data.apps[idx] = { ...data.apps[idx], name, url, category: cat, icon };
    }
    showToast('✅ App updated!');
  } else {
    data.apps.push({
      id: 'app_' + Date.now(),
      name, url, category: cat, icon
    });
    showToast('✅ App added!');
  }

  saveData(data);
  closeModal('appModal');
  render(document.getElementById('searchInput').value);
}

// ============================================================
// ICON HANDLING
// ============================================================
function handleIconFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  // Resize & compress to keep storage small
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 128;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/png', 0.85);
      setIconPreview(dataUrl);
      document.getElementById('iconUrl').value = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  // Reset so same file can be re-selected
  event.target.value = '';
}

function previewIconUrl(url) {
  if (url && url.startsWith('http')) {
    setIconPreview(url);
  } else if (!url) {
    resetIconPreview();
  }
}

function setIconPreview(src) {
  const box = document.getElementById('iconPreviewBox');
  box.innerHTML = `<img src="${src}" alt="preview" 
    onerror="this.parentElement.innerHTML='<span style=\\'color:#ccc;font-size:22px;\\'>❌</span>'"
    style="width:100%;height:100%;object-fit:contain;">`;
}

function resetIconPreview() {
  document.getElementById('iconPreviewBox').innerHTML = '<span style="color:#ccc;font-size:22px;">🖼️</span>';
}

// ============================================================
// CATEGORY MODAL
// ============================================================
let editingCatId = null;

function openCategoryModal() {
  editingCatId = null;
  document.getElementById('categoryModalTitle').textContent = 'Add New Category';
  document.getElementById('categoryName').value = '';
  document.getElementById('categoryEmoji').value = '';
  openModal('categoryModal');
  setTimeout(() => document.getElementById('categoryName').focus(), 100);
}

function editCategory(catId) {
  const cat = data.categories.find(c => c.id === catId);
  if (!cat) return;
  editingCatId = catId;
  document.getElementById('categoryModalTitle').textContent = 'Edit Category';
  document.getElementById('categoryName').value = cat.name;
  document.getElementById('categoryEmoji').value = cat.emoji || cat.icon || '';
  openModal('categoryModal');
}

function saveCategory() {
  const name  = document.getElementById('categoryName').value.trim();
  const emoji = document.getElementById('categoryEmoji').value.trim() || '📁';

  if (!name) { showToast('⚠️ Please enter a category name'); return; }

  if (editingCatId) {
    const idx = data.categories.findIndex(c => c.id === editingCatId);
    if (idx > -1) {
      data.categories[idx] = { ...data.categories[idx], name, emoji };
    }
    showToast('✅ Category updated!');
  } else {
    const newId = 'cat_' + Date.now();
    data.categories.push({ id: newId, name, emoji });
    showToast('✅ Category added!');
  }

  saveData(data);
  closeModal('categoryModal');
  render(document.getElementById('searchInput').value);
}

function deleteCategory(catId) {
  const cat = data.categories.find(c => c.id === catId);
  if (!cat) return;

  const appsInCat = data.apps.filter(a => a.category === catId).length;
  const msg = appsInCat > 0
    ? `Delete "${cat.name}"? The ${appsInCat} app(s) in it will become uncategorized.`
    : `Delete category "${cat.name}"?`;

  showConfirm('Delete Category', msg, () => {
    data.categories = data.categories.filter(c => c.id !== catId);
    saveData(data);
    render(document.getElementById('searchInput').value);
    showToast('🗑️ Category deleted');
  });
}

// ============================================================
// DELETE APP
// ============================================================
function confirmDeleteApp(appId) {
  const app = data.apps.find(a => a.id === appId);
  if (!app) return;
  showConfirm('Delete App', `Remove "${app.name}" from the dashboard?`, () => {
    data.apps = data.apps.filter(a => a.id !== appId);
    saveData(data);
    render(document.getElementById('searchInput').value);
    showToast('🗑️ App removed');
  });
}

// ============================================================
// DRAG AND DROP
// ============================================================
let draggedAppId = null;

function onDragStart(event, appId) {
  draggedAppId = appId;
  const card = document.getElementById('app-' + appId);
  if (card) card.classList.add('dragging');
  event.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(event) {
  if (draggedAppId) {
    const card = document.getElementById('app-' + draggedAppId);
    if (card) card.classList.remove('dragging');
  }
  // Clean up all drag-over highlights
  document.querySelectorAll('.app-grid').forEach(g => g.classList.remove('drag-over'));
}

function onDragOver(event, catId) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.app-grid').forEach(g => g.classList.remove('drag-over'));
  const grid = document.getElementById('grid-' + catId);
  if (grid) grid.classList.add('drag-over');
}

function onDragLeave(event, catId) {
  const grid = document.getElementById('grid-' + catId);
  if (grid && !grid.contains(event.relatedTarget)) {
    grid.classList.remove('drag-over');
  }
}

function onDrop(event, catId) {
  event.preventDefault();
  document.querySelectorAll('.app-grid').forEach(g => g.classList.remove('drag-over'));
  if (!draggedAppId) return;

  const idx = data.apps.findIndex(a => a.id === draggedAppId);
  if (idx > -1 && data.apps[idx].category !== catId) {
    data.apps[idx].category = catId;
    saveData(data);
    render(document.getElementById('searchInput').value);
    showToast('✅ Moved to ' + (data.categories.find(c => c.id === catId)?.name || catId));
  }
  draggedAppId = null;
}

// ============================================================
// CATEGORY SELECT POPULATE
// ============================================================
function populateCategorySelect(selectId, selectedCatId) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = data.categories.map(cat =>
    `<option value="${cat.id}" ${cat.id === selectedCatId ? 'selected' : ''}>${cat.emoji || '📁'} ${escHtml(cat.name)}</option>`
  ).join('');
}

// ============================================================
// MODAL HELPERS
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('active');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// Close on backdrop click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) {
    if (e.target === this) closeModal(this.id);
  });
});

// ============================================================
// CONFIRM DIALOG
// ============================================================
function showConfirm(title, message, onConfirm) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  const btn = document.getElementById('confirmBtn');
  btn.onclick = () => { closeModal('confirmModal'); onConfirm(); };
  openModal('confirmModal');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ============================================================
// UTILS
// ============================================================
function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['appModal','categoryModal','confirmModal'].forEach(id => closeModal(id));
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ============================================================
// INIT
// ============================================================
render();

</script>
</body>
</html>
