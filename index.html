<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moxie Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f9fa;
    color: #333;
    min-height: 100vh;
  }
  .header {
    background: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    height: 36px;
    width: auto;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: #4E8D99;
    letter-spacing: -0.3px;
  }
  .header-right {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: #4E8D99; color: white; }
  .btn-primary:hover { background: #3d7280; }
  .btn-secondary { background: #f0f0f0; color: #555; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-danger { background: #fee2e2; color: #dc2626; }
  .btn-danger:hover { background: #fecaca; }
  .main {
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .category-section { margin-bottom: 32px; }
  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e9ecef;
  }
  .category-title {
    font-size: 18px;
    font-weight: 600;
    color: #444;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
  }
  .app-card {
    background: white;
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border: 2px solid transparent;
    position: relative;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .app-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(78,141,153,0.2);
    border-color: #4E8D99;
  }
  .app-card-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
    gap: 4px;
    z-index: 10;
  }
  .app-card:hover .app-card-actions { display: flex; }
  .app-action-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .app-edit-btn { background: #dbeafe; color: #2563eb; }
  .app-edit-btn:hover { background: #93c5fd; }
  .app-delete-btn { background: #fee2e2; color: #dc2626; }
  .app-delete-btn:hover { background: #fca5a5; }
  .app-icon-wrapper {
    width: 56px;
    height: 56px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    overflow: hidden;
    background: #f8f9fa;
  }
  .app-icon-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .app-icon-emoji { font-size: 32px; line-height: 1; }
  .app-name {
    font-size: 12px;
    font-weight: 500;
    color: #444;
    line-height: 1.3;
    word-break: break-word;
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
    background: white;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: #4E8D99; }
  .icon-preview {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .icon-preview-box {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1.5px solid #e0e0e0;
    flex-shrink: 0;
  }
  .icon-preview-box img { width: 100%; height: 100%; object-fit: contain; }
  .icon-options { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .icon-option-btn {
    padding: 6px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    font-size: 12px;
    color: #555;
    transition: all 0.2s;
  }
  .icon-option-btn:hover, .icon-option-btn.active {
    border-color: #4E8D99;
    color: #4E8D99;
    background: #f0f9fb;
  }
  .upload-btn-label {
    padding: 6px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    font-size: 12px;
    color: #555;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .upload-btn-label:hover { border-color: #4E8D99; color: #4E8D99; background: #f0f9fb; }
  #iconFileInput { display: none; }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #eee;
  }
  .cat-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    max-height: 300px;
    overflow-y: auto;
  }
  .cat-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #f8f9fa;
    border-radius: 8px;
    border: 1px solid #e9ecef;
  }
  .cat-item-left { display: flex; align-items: center; gap: 10px; }
  .cat-item-name { font-size: 14px; font-weight: 500; }
  .add-cat-form { display: flex; gap: 8px; margin-top: 12px; }
  .add-cat-form input {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .add-cat-form input:focus { border-color: #4E8D99; }
  .app-card.dragging { opacity: 0.4; border: 2px dashed #4E8D99; }
  .apps-grid.drag-over { background: #f0f9fb; border-radius: 12px; border: 2px dashed #4E8D99; }
  .hidden { display: none !important; }
  @media (max-width: 600px) {
    .main { padding: 16px; }
    .header { padding: 12px 16px; }
    .apps-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .header-title { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <svg class="header-logo" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="800" fill="#4E8D99">moxie</text>
    </svg>
  </div>
  <div class="header-right">
    <button class="btn btn-secondary" onclick="openCategoryModal()">⚙️ Categories</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add App</button>
  </div>
</div>

<div class="main" id="mainContent"></div>

<!-- Add/Edit App Modal -->
<div class="modal-overlay hidden" id="appModal">
  <div class="modal">
    <h2 id="appModalTitle">Add App</h2>
    <div class="form-group">
      <label>App Name *</label>
      <input type="text" id="appName" placeholder="e.g. Gmail">
    </div>
    <div class="form-group">
      <label>URL *</label>
      <input type="url" id="appUrl" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="appCategory"></select>
    </div>
    <div class="form-group">
      <label>Icon</label>
      <div class="icon-options" style="margin-bottom:8px;">
        <button class="icon-option-btn active" id="btnAutoIcon" onclick="setIconMode('auto')">Auto (from URL)</button>
        <button class="icon-option-btn" id="btnUrlIcon" onclick="setIconMode('url')">Icon URL</button>
        <label class="upload-btn-label">
          📁 Upload Image
          <input type="file" id="iconFileInput" accept="image/*" onchange="handleIconUpload(event)">
        </label>
      </div>
      <div id="iconUrlGroup" class="hidden">
        <input type="url" id="appIconUrl" placeholder="https://example.com/icon.png">
      </div>
      <div class="icon-preview">
        <div class="icon-preview-box">
          <img id="iconPreviewImg" src="" alt="" style="display:none;">
          <span id="iconPreviewEmoji" style="font-size:28px;">🔗</span>
        </div>
        <span style="font-size:12px;color:#888;">Icon preview</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeAppModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveApp()">Save App</button>
    </div>
  </div>
</div>

<!-- Category Manager Modal -->
<div class="modal-overlay hidden" id="categoryModal">
  <div class="modal">
    <h2>Manage Categories</h2>
    <div class="cat-list" id="catList"></div>
    <div class="add-cat-form">
      <input type="text" id="newCatName" placeholder="New category name...">
      <input type="text" id="newCatEmoji" placeholder="Emoji" style="width:70px;">
      <button class="btn btn-primary" onclick="addCategory()">Add</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="resetToDefaults()" style="margin-right:auto;background:#fff3cd;color:#856404;border:1px solid #ffc107;">↺ Reset All</button>
      <button class="btn btn-primary" onclick="closeCategoryModal()">Done</button>
    </div>
  </div>
</div>

  { id: 'pharmapromos', name: 'Pharma Promos', url: 'https://www.notion.so/moxie-docs/27ae63b2b0a3803b89cceeedba52132b?v=27ae63b2b0a380f3a719000c273997d8', category: 'supplies',
    icon: 'https://www.notion.so/images/favicon.ico' },
  { id: 'pharmapricing', name: 'Pharma Pricing', url: 'https://docs.google.com/spreadsheets/d/1kHcpXh-aWWCGGCXlU51RaEsjrHVr2o4jaKypo8GerXw/edit?gid=227519511#gid=227519511', category: 'supplies',

  { id: 'laserprices', name: 'Laser & Device Prices', url: 'https://www.notion.so/moxie-docs/Laser-and-Energy-Device-Look-Book-224e63b2b0a380dd9177d14fd9b2244e', category: 'supplies',
    icon: 'https://www.notion.so/images/favicon.ico' }
];

// ===================== STATE =====================
// Use a single storage key. State includes categories, apps, deletedAppIds, deletedCatIds
const STORAGE_KEY = 'moxieDashboard_v5';
let state = { categories: [], apps: [], deletedAppIds: [], deletedCatIds: [] };
let editingAppId = null;
let iconMode = 'auto';
let uploadedIconData = null;
let dragSrcId = null;

// ===================== STORAGE =====================
function getDefaultState() {
  return {
    categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
    apps: JSON.parse(JSON.stringify(DEFAULT_APPS)),
    deletedAppIds: [],
    deletedCatIds: []
  };
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state = {
        categories: parsed.categories || [],
        apps: parsed.apps || [],
        deletedAppIds: parsed.deletedAppIds || [],
        deletedCatIds: parsed.deletedCatIds || []
      };

      // Add any new default categories that aren't deleted and don't exist yet
      DEFAULT_CATEGORIES.forEach(dc => {
        const alreadyDeleted = state.deletedCatIds.includes(dc.id);
        const alreadyExists = state.categories.find(c => c.id === dc.id);
        if (!alreadyDeleted && !alreadyExists) {
          state.categories.push(JSON.parse(JSON.stringify(dc)));
        }
      });

      // Add any new default apps that aren't deleted and don't exist yet
      DEFAULT_APPS.forEach(da => {
        const alreadyDeleted = state.deletedAppIds.includes(da.id);
        const alreadyExists = state.apps.find(a => a.id === da.id);
        if (!alreadyDeleted && !alreadyExists) {
          state.apps.push(JSON.parse(JSON.stringify(da)));
        }
      });
    } else {
      state = getDefaultState();
    }
  } catch(e) {
    console.warn('Load error:', e);
    state = getDefaultState();
  }
  saveState();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {
    console.warn('Could not save to localStorage:', e);
  }
}

function resetToDefaults() {
  if (!confirm('Reset everything to defaults? All custom apps and categories will be lost.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = getDefaultState();
  saveState();
  closeCategoryModal();
  render();
}

// ===================== RENDER =====================
function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  state.categories.forEach(cat => {
    const apps = state.apps.filter(a => a.category === cat.id);
    if (apps.length === 0) return;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.setAttribute('data-category', cat.id);

    section.innerHTML = `
      <div class="category-header">
        <div class="category-title">
          <span>${cat.emoji || ''}</span>
          <span>${escapeHtml(cat.name)}</span>
        </div>
      </div>
      <div class="apps-grid"
           id="grid-${cat.id}"
           ondragover="onDragOver(event)"
           ondrop="onDrop(event, '${cat.id}')"
           ondragleave="onDragLeave(event)">
      </div>
    `;

    main.appendChild(section);
    const grid = section.querySelector(`#grid-${cat.id}`);
    apps.forEach(app => grid.appendChild(createAppCard(app)));
  });

  // Uncategorized
  const uncategorized = state.apps.filter(a => !state.categories.find(c => c.id === a.category));
  if (uncategorized.length > 0) {
    const section = document.createElement('div');
    section.className = 'category-section';
    section.innerHTML = `
      <div class="category-header">
        <div class="category-title"><span>📎 Uncategorized</span></div>
      </div>
      <div class="apps-grid" id="grid-uncategorized"
           ondragover="onDragOver(event)"
           ondrop="onDrop(event, 'uncategorized')"
           ondragleave="onDragLeave(event)"></div>
    `;
    main.appendChild(section);
    const grid = section.querySelector('#grid-uncategorized');
    uncategorized.forEach(app => grid.appendChild(createAppCard(app)));
  }
}

function createAppCard(app) {
  const card = document.createElement('a');
  card.className = 'app-card';
  card.href = app.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.setAttribute('data-id', app.id);
  card.draggable = true;

  card.addEventListener('dragstart', (e) => {
    dragSrcId = app.id;
    setTimeout(() => card.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));

  const iconHtml = getIconHtml(app);

  card.innerHTML = `
    <div class="app-card-actions">
      <button class="app-action-btn app-edit-btn" title="Edit" onclick="openEditModal('${escapeHtml(app.id)}', event)">✏️</button>
      <button class="app-action-btn app-delete-btn" title="Delete" onclick="deleteApp('${escapeHtml(app.id)}', event)">×</button>
    </div>
    <div class="app-icon-wrapper">${iconHtml}</div>
    <div class="app-name">${escapeHtml(app.name)}</div>
  `;

  return card;
}

function getIconHtml(app) {
  if (!app.icon) {
    return `<span class="app-icon-emoji">${getDefaultEmoji(app.name)}</span>`;
  }
  return `<img src="${escapeHtml(app.icon)}" alt="${escapeHtml(app.name)}"
    onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
    <span class="app-icon-emoji" style="display:none;">${getDefaultEmoji(app.name)}</span>`;
}

function getDefaultEmoji(name) {
  const n = (name || '').toLowerCase();
  if (n.includes('gmail') || n.includes('mail')) return '📧';
  if (n.includes('meet') || n.includes('zoom')) return '📹';
  if (n.includes('slack')) return '💬';
  if (n.includes('sheet') || n.includes('excel')) return '📊';
  if (n.includes('notion')) return '📝';
  if (n.includes('calendar')) return '📅';
  if (n.includes('stripe') || n.includes('ramp')) return '💳';
  if (n.includes('justworks')) return '👥';
  if (n.includes('shopify')) return '🛍️';
  if (n.includes('github')) return '🐙';
  if (n.includes('zapier')) return '⚡';
  if (n.includes('password')) return '🔑';
  if (n.includes('chat') || n.includes('gpt') || n.includes('ai')) return '🤖';
  if (n.includes('asana') || n.includes('clickup')) return '✅';
  if (n.includes('loom')) return '🎥';
  if (n.includes('hubspot')) return '🎯';
  if (n.includes('glean')) return '🔍';
  if (n.includes('pharma') || n.includes('laser') || n.includes('supply') || n.includes('supplies')) return '💊';
  if (n.includes('notebook')) return '📓';
  if (n.includes('fathom')) return '📊';
  return '🔗';
}

function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===================== DRAG & DROP =====================
function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
  e.dataTransfer.dropEffect = 'move';
}

function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function onDrop(e, categoryId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcId) {
    const app = state.apps.find(a => a.id === dragSrcId);
    if (app) {
      app.category = categoryId;
      saveState();
      render();
    }
    dragSrcId = null;
  }
}

// ===================== APP MODAL =====================
function openAddModal() {
  editingAppId = null;
  iconMode = 'auto';
  uploadedIconData = null;
  document.getElementById('appModalTitle').textContent = 'Add App';
  document.getElementById('appName').value = '';
  document.getElementById('appUrl').value = '';
  document.getElementById('appIconUrl').value = '';
  updateIconPreview('');
  setIconMode('auto');
  populateCategorySelect();
  document.getElementById('appModal').classList.remove('hidden');
}

function openEditModal(appId, e) {
  e.preventDefault();
  e.stopPropagation();
  const app = state.apps.find(a => a.id === appId);
  if (!app) return;
  editingAppId = appId;
  uploadedIconData = null;
  document.getElementById('appModalTitle').textContent = 'Edit App';
  document.getElementById('appName').value = app.name;
  document.getElementById('appUrl').value = app.url;
  populateCategorySelect(app.category);

  if (app.icon && app.icon.startsWith('data:')) {
    iconMode = 'upload';
    uploadedIconData = app.icon;
    setIconMode('upload');
    updateIconPreview(app.icon);
  } else if (app.icon) {
    iconMode = 'url';
    document.getElementById('appIconUrl').value = app.icon;
    setIconMode('url');
    updateIconPreview(app.icon);
  } else {
    iconMode = 'auto';
    setIconMode('auto');
    updateIconPreview(getAutoIcon(app.url));
  }

  document.getElementById('appModal').classList.remove('hidden');
}

function closeAppModal() {
  document.getElementById('appModal').classList.add('hidden');
}

function populateCategorySelect(selectedId) {
  const sel = document.getElementById('appCategory');
  sel.innerHTML = '';
  state.categories.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = `${cat.emoji || ''} ${cat.name}`;
    if (cat.id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function setIconMode(mode) {
  iconMode = mode;
  document.getElementById('btnAutoIcon').classList.toggle('active', mode === 'auto');
  document.getElementById('btnUrlIcon').classList.toggle('active', mode === 'url');
  document.getElementById('iconUrlGroup').classList.toggle('hidden', mode !== 'url');

  if (mode === 'auto') {
    updateIconPreview(getAutoIcon(document.getElementById('appUrl').value));
  } else if (mode === 'url') {
    updateIconPreview(document.getElementById('appIconUrl').value);
  } else if (mode === 'upload' && uploadedIconData) {
    updateIconPreview(uploadedIconData);
  }
}

function getAutoIcon(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  } catch(e) { return ''; }
}

function handleIconUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    uploadedIconData = ev.target.result;
    iconMode = 'upload';
    document.getElementById('btnAutoIcon').classList.remove('active');
    document.getElementById('btnUrlIcon').classList.remove('active');
    updateIconPreview(uploadedIconData);
  };
  reader.readAsDataURL(file);
}

document.getElementById('appIconUrl').addEventListener('input', function() {
  if (iconMode === 'url') updateIconPreview(this.value);
});

document.getElementById('appUrl').addEventListener('input', function() {
  if (iconMode === 'auto') updateIconPreview(getAutoIcon(this.value));
});

function updateIconPreview(src) {
  const img = document.getElementById('iconPreviewImg');
  const emoji = document.getElementById('iconPreviewEmoji');
  if (src) {
    img.src = src;
    img.style.display = 'block';
    emoji.style.display = 'none';
    img.onerror = function() {
      img.style.display = 'none';
      emoji.style.display = 'block';
    };
  } else {
    img.style.display = 'none';
    emoji.style.display = 'block';
    emoji.textContent = '🔗';
  }
}

function saveApp() {
  const name = document.getElementById('appName').value.trim();
  const url = document.getElementById('appUrl').value.trim();
  const category = document.getElementById('appCategory').value;

  if (!name) { alert('Please enter an app name.'); return; }
  if (!url) { alert('Please enter a URL.'); return; }

  let icon = '';
  if (iconMode === 'upload' && uploadedIconData) {
    icon = uploadedIconData;
  } else if (iconMode === 'url') {
    icon = document.getElementById('appIconUrl').value.trim();
  } else {
    try {
      const hostname = new URL(url).hostname;
      icon = `https://www.google.com/s2/favicons?domain=${hostname}&sz=64`;
    } catch(e) { icon = ''; }
  }

  if (editingAppId) {
    const app = state.apps.find(a => a.id === editingAppId);
    if (app) {
      app.name = name;
      app.url = url;
      app.category = category;
      app.icon = icon;
    }
  } else {
    const newId = 'app_' + Date.now();
    state.apps.push({ id: newId, name, url, category, icon });
  }

  saveState();
  render();
  closeAppModal();
}

// ===================== DELETE APP =====================
function deleteApp(appId, e) {
  e.preventDefault();
  e.stopPropagation();
  if (!confirm('Delete this app?')) return;

  // Track deletion so it doesn't come back on refresh
  if (!state.deletedAppIds.includes(appId)) {
    state.deletedAppIds.push(appId);
  }
  state.apps = state.apps.filter(a => a.id !== appId);
  saveState();
  render();
}

// ===================== CATEGORY MODAL =====================
function openCategoryModal() {
  renderCatList();
  document.getElementById('categoryModal').classList.remove('hidden');
}

function closeCategoryModal() {
  document.getElementById('categoryModal').classList.add('hidden');
  render();
}

function renderCatList() {
  const list = document.getElementById('catList');
  list.innerHTML = '';
  state.categories.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = `
      <div class="cat-item-left">
        <span style="font-size:20px;">${cat.emoji || '📁'}</span>
        <span class="cat-item-name">${escapeHtml(cat.name)}</span>
      </div>
      <button class="app-action-btn app-delete-btn"
        style="width:auto;padding:4px 10px;border-radius:6px;height:auto;"
        onclick="deleteCategory('${escapeHtml(cat.id)}')">Remove</button>
    `;
    list.appendChild(item);
  });
}

function addCategory() {
  const name = document.getElementById('newCatName').value.trim();
  const emoji = document.getElementById('newCatEmoji').value.trim() || '📁';
  if (!name) return;
  const id = 'cat_' + Date.now();
  state.categories.push({ id, name, emoji });
  document.getElementById('newCatName').value = '';
  document.getElementById('newCatEmoji').value = '';
  saveState();
  renderCatList();
}

function deleteCategory(catId) {
  const count = state.apps.filter(a => a.category === catId).length;
  if (count > 0 && !confirm(`This category has ${count} app(s). Remove category anyway? Apps will appear as uncategorized.`)) return;

  // Track deleted category ID so it doesn't come back
  if (!state.deletedCatIds.includes(catId)) {
    state.deletedCatIds.push(catId);
  }
  state.categories = state.categories.filter(c => c.id !== catId);
  saveState();
  renderCatList();
}

// ===================== CLOSE MODALS ON OVERLAY CLICK =====================
document.getElementById('appModal').addEventListener('click', function(e) {
  if (e.target === this) closeAppModal();
});
document.getElementById('categoryModal').addEventListener('click', function(e) {
  if (e.target === this) closeCategoryModal();
});

// ===================== INIT =====================
loadState();
render();
</script>
</body>
