<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moxie Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #333; }
  
  header {
    background: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #4E8D99;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-area img { height: 36px; }
  .logo-area h1 { font-size: 1.4rem; color: #4E8D99; font-weight: 700; }
  
  .header-actions { display: flex; gap: 10px; align-items: center; }
  
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-primary { background: #4E8D99; color: white; }
  .btn-primary:hover { background: #3a7a85; }
  .btn-secondary { background: #6D445E; color: white; }
  .btn-secondary:hover { background: #5a3650; }
  .btn-danger { background: #e74c3c; color: white; }
  .btn-danger:hover { background: #c0392b; }
  .btn-outline { background: white; color: #4E8D99; border: 2px solid #4E8D99; }
  .btn-outline:hover { background: #4E8D99; color: white; }
  .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
  
  .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  
  .search-bar {
    display: flex;
    align-items: center;
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 24px;
    gap: 10px;
    max-width: 500px;
  }
  .search-bar input {
    border: none;
    outline: none;
    font-size: 0.95rem;
    flex: 1;
    color: #333;
  }
  .search-bar span { color: #999; font-size: 1.1rem; }
  
  .category-section { margin-bottom: 36px; }
  
  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #EBBA95;
  }
  
  .category-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
    font-weight: 700;
    color: #4E8D99;
  }
  
  .category-actions { display: flex; gap: 6px; }
  
  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
  }
  
  .app-card {
    background: white;
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    text-decoration: none;
    display: block;
    color: #333;
  }
  .app-card:hover {
    border-color: #4E8D99;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(78,141,153,0.2);
  }
  
  .app-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    object-fit: contain;
    margin: 0 auto 10px;
    display: block;
  }
  
  .app-icon-fallback {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: linear-gradient(135deg, #4E8D99, #6D445E);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 700;
    color: white;
    margin: 0 auto 10px;
  }
  
  .app-name {
    font-size: 0.78rem;
    font-weight: 600;
    color: #444;
    line-height: 1.3;
    word-break: break-word;
  }
  
  .card-menu-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .app-card:hover .card-menu-btn { opacity: 1; color: #999; }
  .card-menu-btn:hover { color: #4E8D99 !important; background: #f0f0f0; }
  
  .card-dropdown {
    position: absolute;
    top: 28px;
    right: 6px;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    z-index: 200;
    min-width: 130px;
    overflow: hidden;
    display: none;
  }
  .card-dropdown.open { display: block; }
  .card-dropdown button {
    display: block;
    width: 100%;
    padding: 9px 14px;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.82rem;
    color: #444;
    transition: background 0.15s;
  }
  .card-dropdown button:hover { background: #f5f5f5; }
  .card-dropdown button.danger { color: #e74c3c; }
  .card-dropdown button.danger:hover { background: #fff5f5; }
  
  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 32px;
    width: 90%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h2 { font-size: 1.3rem; color: #4E8D99; margin-bottom: 20px; font-weight: 700; }
  
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    color: #333;
    background: white;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: #4E8D99;
  }
  
  .icon-preview-area {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    padding: 12px;
    background: #f8f9fa;
    border-radius: 8px;
    border: 2px dashed #e0e0e0;
  }
  .icon-preview-img {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    object-fit: contain;
    border: 1px solid #e0e0e0;
    background: white;
  }
  .icon-preview-label { font-size: 0.8rem; color: #888; }
  
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  
  .empty-state {
    text-align: center;
    padding: 40px;
    color: #aaa;
    font-size: 0.9rem;
  }
  
  .drag-over { background: #e8f5f7 !important; border: 2px dashed #4E8D99 !important; }
  
  .add-category-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: white;
    border: 2px dashed #EBBA95;
    border-radius: 10px;
    color: #6D445E;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 24px;
    transition: all 0.2s;
  }
  .add-category-btn:hover { background: #fdf5ef; border-color: #6D445E; }
  
  .no-results { text-align: center; padding: 60px; color: #999; }
  
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #4E8D99;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  
  .drag-handle {
    cursor: grab;
    color: #ccc;
    font-size: 0.8rem;
    margin-right: 4px;
  }
  
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .main { padding: 16px; }
    .apps-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
    .header-actions .btn span { display: none; }
  }
</style>
</head>

// ============================================================
// MIGRATION - load from old keys if new key is empty
// ============================================================
function migrateOldData() {
  const existing = localStorage.getItem(STORAGE_KEY);
  if (existing) return; // already have new format

  // Try to merge from old keys
  let apps = [];
  let categories = [];

  const oldKeys = ['moxie_apps', 'moxie_categories', 'moxieDashboardApps', 'moxieApps'];
  oldKeys.forEach(k => {
    try {
      const raw = localStorage.getItem(k);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          parsed.forEach(item => {
            if (item.url && item.name) apps.push(item);
            else if ((item.id || item.name) && !item.url) categories.push(item);
          });
        }
      }
    } catch(e) {}
  });

  if (apps.length > 0 || categories.length > 0) {
    const def = getDefaultData();
    if (categories.length === 0) categories = def.categories;
    if (apps.length === 0) apps = def.apps;
    saveData({ categories, apps });
    showToast('✅ Migrated your saved apps!');
  }
}

// ============================================================
// RENDER
// ============================================================

let editingAppId = null;
let editingCatId = null;
let openDropdownId = null;
let dragSrcId = null;

function renderDashboard() {
  const data = getData();
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const container = document.getElementById('dashboard');
  container.innerHTML = '';

  // Populate category select
  const catSelect = document.getElementById('appCategory');
  if (catSelect) {
    catSelect.innerHTML = data.categories.map(c =>
      `<option value="${c.id}">${c.emoji || ''} ${c.name}</option>`
    ).join('');
  }

  let hasAny = false;

  data.categories.forEach(cat => {
    const apps = data.apps.filter(a =>
      a.category === cat.id &&
      (!query || a.name.toLowerCase().includes(query))
    );

    const section = document.createElement('div');
    section.className = 'category-section';
    section.setAttribute('data-cat-id', cat.id);
    section.setAttribute('draggable', 'false');

    section.innerHTML = `
      <div class="category-header">
        <div class="category-title">
          <span>${cat.emoji || '📁'}</span>
          <span>${cat.name}</span>
          <span style="font-size:0.75rem;color:#999;font-weight:400;">(${apps.length})</span>
        </div>
        <div class="category-actions">
          <button class="btn btn-sm btn-outline" onclick="openEditCategoryModal('${cat.id}')">✏️ Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteCategory('${cat.id}')">🗑</button>
        </div>
      </div>
      <div class="apps-grid" id="grid-${cat.id}" ondragover="onDragOver(event,'${cat.id}')" ondrop="onDrop(event,'${cat.id}')" ondragleave="onDragLeave(event,'${cat.id}')">
        ${apps.length === 0 ? '<div class="empty-state">No apps yet — click + Add App</div>' : ''}
      </div>
    `;

    const grid = section.querySelector('.apps-grid');
    apps.forEach(app => {
      grid.appendChild(createAppCard(app));
    });

    container.appendChild(section);
    if (apps.length > 0) hasAny = true;
  });

  if (query && !hasAny) {
    container.innerHTML = `<div class="no-results">🔍 No apps found for "<strong>${query}</strong>"</div>`;
  }
}

function createAppCard(app) {
  const card = document.createElement('div');
  card.className = 'app-card';
  card.setAttribute('draggable', 'true');
  card.setAttribute('data-app-id', app.id);
  card.setAttribute('data-app-url', app.url);

  card.ondragstart = (e) => onDragStart(e, app.id);
  card.ondragend = onDragEnd;

  // Main click — open URL (but not if clicking menu)
  card.onclick = (e) => {
    if (e.target.closest('.card-menu-btn') || e.target.closest('.card-dropdown')) return;
    window.open(app.url, '_blank');
  };

  const iconHtml = app.icon
    ? `<img class="app-icon" src="${app.icon}" alt="${app.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
       <div class="app-icon-fallback" style="display:none;">${app.name.charAt(0).toUpperCase()}</div>`
    : `<div class="app-icon-fallback">${app.name.charAt(0).toUpperCase()}</div>`;

  card.innerHTML = `
    ${iconHtml}
    <div class="app-name">${app.name}</div>
    <button class="card-menu-btn" onclick="toggleDropdown(event,'${app.id}')">⋯</button>
    <div class="card-dropdown" id="drop-${app.id}">
      <button onclick="openEditAppModal('${app.id}')">✏️ Edit</button>
      <button onclick="openMoveModal('${app.id}')">📂 Move</button>
      <button class="danger" onclick="deleteApp('${app.id}')">🗑 Delete</button>
    </div>
  `;

  return card;
}

// ============================================================
// DRAG AND DROP
// ============================================================

function onDragStart(e, appId) {
  dragSrcId = appId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', appId);
}

function onDragEnd(e) {
  dragSrcId = null;
  document.querySelectorAll('.apps-grid').forEach(g => g.classList.remove('drag-over'));
}

function onDragOver(e, catId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById(`grid-${catId}`)?.classList.add('drag-over');
}

function onDragLeave(e, catId) {
  document.getElementById(`grid-${catId}`)?.classList.remove('drag-over');
}

function onDrop(e, catId) {
  e.preventDefault();
  document.getElementById(`grid-${catId}`)?.classList.remove('drag-over');
  const appId = e.dataTransfer.getData('text/plain') || dragSrcId;
  if (!appId) return;
  const data = getData();
  const app = data.apps.find(a => a.id === appId);
  if (app) {
    app.category = catId;
    saveData(data);
    renderDashboard();
    showToast(`Moved to ${data.categories.find(c => c.id === catId)?.name || catId}`);
  }
}

// ============================================================
// DROPDOWN MENU
// ============================================================

function toggleDropdown(e, appId) {
  e.stopPropagation();
  const drop = document.getElementById(`drop-${appId}`);
  if (!drop) return;
  const isOpen = drop.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) {
    drop.classList.add('open');
    openDropdownId = appId;
  }
}

function closeAllDropdowns() {
  document.querySelectorAll('.card-dropdown.open').forEach(d => d.classList.remove('open'));
  openDropdownId = null;
}

document.addEventListener('click', closeAllDropdowns);

// ============================================================
// APP MODAL
// ============================================================

function openAddModal(categoryId) {
  editingAppId = null;
  document.getElementById('modalTitle').textContent = 'Add App';
  document.getElementById('appName').value = '';
  document.getElementById('appUrl').value = '';
  document.getElementById('appIconUrl').value = '';
  document.getElementById('iconPreviewArea').style.display = 'none';
  document.getElementById('saveAppBtn').textContent = 'Save App';

  // Populate categories
  const data = getData();
  const sel = document.getElementById('appCategory');
  sel.innerHTML = data.categories.map(c =>
    `<option value="${c.id}" ${c.id === categoryId ? 'selected' : ''}>${c.emoji || ''} ${c.name}</option>`
  ).join('');

  document.getElementById('appModal').classList.add('open');
  setTimeout(() => document.getElementById('appName').focus(), 100);
}

function openEditAppModal(appId) {
  closeAllDropdowns();
  const data = getData();
  const app = data.apps.find(a => a.id === appId);
  if (!app) return;

  editingAppId = appId;
  document.getElementById('modalTitle').textContent = 'Edit App';
  document.getElementById('appName').value = app.name;
  document.getElementById('appUrl').value = app.url;
  document.getElementById('appIconUrl').value = app.icon || '';
  document.getElementById('saveAppBtn').textContent = 'Update App';

  // Preview icon
  if (app.icon) {
    document.getElementById('iconPreviewImg').src = app.icon;
    document.getElementById('iconPreviewArea').style.display = 'flex';
  } else {
    document.getElementById('iconPreviewArea').style.display = 'none';
  }

  // Populate categories
  const sel = document.getElementById('appCategory');
  sel.innerHTML = data.categories.map(c =>
    `<option value="${c.id}" ${c.id === app.category ? 'selected' : ''}>${c.emoji || ''} ${c.name}</option>`
  ).join('');

  document.getElementById('appModal').classList.add('open');
}

function closeAppModal() {
  document.getElementById('appModal').classList.remove('open');
  editingAppId = null;
}

function saveApp() {
  const name = document.getElementById('appName').value.trim();
  const url = document.getElementById('appUrl').value.trim();
  const category = document.getElementById('appCategory').value;
  const iconUrl = document.getElementById('appIconUrl').value.trim();

  if (!name) { showToast('⚠️ Please enter an app name', true); return; }
  if (!url) { showToast('⚠️ Please enter a URL', true); return; }

  let fullUrl = url;
  if (fullUrl && !fullUrl.startsWith('http') && !fullUrl.startsWith('data:')) {
    fullUrl = 'https://' + fullUrl;
  }

  const data = getData();

  if (editingAppId) {
    const app = data.apps.find(a => a.id === editingAppId);
    if (app) {
      app.name = name;
      app.url = fullUrl;
      app.category = category;
      if (iconUrl) app.icon = iconUrl;
    }
    showToast('✅ App updated!');
  } else {
    const newApp = {
      id: 'app_' + Date.now(),
      name,
      url: fullUrl,
      category,
      icon: iconUrl || ''
    };
    data.apps.push(newApp);
    showToast('✅ App added!');
  }

  saveData(data);
  closeAppModal();
  renderDashboard();
}

// ============================================================
// ICON UPLOAD
// ============================================================

function handleIconUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (file.size > 2 * 1024 * 1024) {
    showToast('⚠️ Image too large. Max 2MB.', true);
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    document.getElementById('appIconUrl').value = dataUrl;
    document.getElementById('iconPreviewImg').src = dataUrl;
    document.getElementById('iconPreviewArea').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function previewIcon() {
  const url = document.getElementById('appIconUrl').value.trim();
  if (url) {
    document.getElementById('iconPreviewImg').src = url;
    document.getElementById('iconPreviewArea').style.display = 'flex';
  } else {
    document.getElementById('iconPreviewArea').style.display = 'none';
  }
}

// ============================================================
// CATEGORY MODAL
// ============================================================

function openAddCategoryModal() {
  editingCatId = null;
  document.getElementById('catModalTitle').textContent = 'Add Category';
  document.getElementById('catName').value = '';
  document.getElementById('catEmoji').value = '';
  document.getElementById('categoryModal').classList.add('open');
  setTimeout(() => document.getElementById('catName').focus(), 100);
}

function openEditCategoryModal(catId) {
  const data = getData();
  const cat = data.categories.find(c => c.id === catId);
  if (!cat) return;
  editingCatId = catId;
  document.getElementById('catModalTitle').textContent = 'Edit Category';
  document.getElementById('catName').value = cat.name;
  document.getElementById('catEmoji').value = cat.emoji || '';
  document.getElementById('categoryModal').classList.add('open');
}

function closeCategoryModal() {
  document.getElementById('categoryModal').classList.remove('open');
  editingCatId = null;
}

function saveCategory() {
  const name = document.getElementById('catName').value.trim();
  const emoji = document.getElementById('catEmoji').value.trim();
  if (!name) { showToast('⚠️ Please enter a category name', true); return; }

  const data = getData();

  if (editingCatId) {
    const cat = data.categories.find(c => c.id === editingCatId);
    if (cat) { cat.name = name; cat.emoji = emoji; }
    showToast('✅ Category updated!');
  } else {
    data.categories.push({
      id: 'cat_' + Date.now(),
      name,
      emoji: emoji || '📁'
    });
    showToast('✅ Category added!');
  }

  saveData(data);
  closeCategoryModal();
  renderDashboard();
}

// ============================================================
// DELETE
// ============================================================

function deleteApp(appId) {
  closeAllDropdowns();
  if (!confirm('Delete this app?')) return;
  const data = getData();
  data.apps = data.apps.filter(a => a.id !== appId);
  saveData(data);
  renderDashboard();
  showToast('🗑 App deleted');
}

function deleteCategory(catId) {
  const data = getData();
  const appsInCat = data.apps.filter(a => a.category === catId);
  if (appsInCat.length > 0) {
    if (!confirm(`This category has ${appsInCat.length} app(s). Delete category and all its apps?`)) return;
    data.apps = data.apps.filter(a => a.category !== catId);
  } else {
    if (!confirm('Delete this category?')) return;
  }
  data.categories = data.categories.filter(c => c.id !== catId);
  saveData(data);
  renderDashboard();
  showToast('🗑 Category deleted');
}

// ============================================================
// MOVE APP (quick helper via drag or button)
// ============================================================

function openMoveModal(appId) {
  closeAllDropdowns();
  const data = getData();
  const app = data.apps.find(a => a.id === appId);
  if (!app) return;

  const options = data.categories
    .filter(c => c.id !== app.category)
    .map(c => `<option value="${c.id}">${c.emoji || ''} ${c.name}</option>`)
    .join('');

  if (!options) { showToast('No other categories to move to'); return; }

  const target = prompt(
    'Enter category name to move to:\n' +
    data.categories.filter(c => c.id !== app.category).map(c => `• ${c.name}`).join('\n')
  );

  if (!target) return;
  const cat = data.categories.find(c => c.name.toLowerCase() === target.toLowerCase().trim());
  if (!cat) { showToast('⚠️ Category not found', true); return; }

  app.category = cat.id;
  saveData(data);
  renderDashboard();
  showToast(`Moved to ${cat.name}`);
}

// ============================================================
// EXPORT / IMPORT
// ============================================================

function exportData() {
  const data = getData();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'moxie-dashboard-backup.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Exported successfully!');
}

function importData() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.categories || !data.apps) throw new Error('Invalid format');
      if (!confirm(`Import ${data.apps.length} apps and ${data.categories.length} categories? This will replace your current dashboard.`)) return;
      saveData(data);
      renderDashboard();
      showToast('✅ Dashboard imported!');
    } catch(err) {
      showToast('⚠️ Invalid file format', true);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============================================================
// TOAST
// ============================================================

let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#e74c3c' : '#4E8D99';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeAppModal();
    closeCategoryModal();
    closeAllDropdowns();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput')?.focus();
  }
});

// ============================================================
// INIT
// ============================================================

migrateOldData();
renderDashboard();
</script>
