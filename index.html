<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moxie Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f9fa;
    color: #333;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #4E8D99;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-area img {
    height: 36px;
    object-fit: contain;
  }

  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: #4E8D99;
    letter-spacing: -0.5px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #4E8D99;
    color: white;
  }

  .btn-primary:hover { background: #3d7080; }

  .btn-secondary {
    background: #6D445E;
    color: white;
  }

  .btn-secondary:hover { background: #5a3750; }

  .btn-outline {
    background: white;
    color: #4E8D99;
    border: 2px solid #4E8D99;
  }

  .btn-outline:hover { background: #f0f8fa; }

  /* SEARCH */
  .search-bar {
    padding: 16px 32px;
    background: white;
    border-bottom: 1px solid #e9ecef;
  }

  .search-bar input {
    width: 100%;
    max-width: 500px;
    padding: 10px 16px;
    border: 2px solid #e9ecef;
    border-radius: 50px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: #4E8D99; }

  /* MAIN */
  .main {
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* CATEGORY */
  .category-section {
    margin-bottom: 32px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #e9ecef;
  }

  .category-icon { font-size: 20px; }

  .category-name {
    font-size: 18px;
    font-weight: 700;
    color: #4E8D99;
  }

  .category-count {
    background: #EBBA95;
    color: #6D445E;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* APP GRID */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
  }

  /* APP CARD */
  .app-card {
    background: white;
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    position: relative;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .app-card:hover {
    border-color: #4E8D99;
    box-shadow: 0 4px 16px rgba(78,141,153,0.2);
    transform: translateY(-2px);
  }

  .app-card-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
    gap: 4px;
  }

  .app-card:hover .app-card-actions { display: flex; }

  .card-btn {
    background: rgba(78,141,153,0.15);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    padding: 2px 5px;
    font-size: 11px;
    color: #4E8D99;
    transition: background 0.2s;
  }

  .card-btn:hover { background: rgba(78,141,153,0.3); }

  .card-btn.delete { color: #e74c3c; }
  .card-btn.delete:hover { background: rgba(231,76,60,0.15); }

  /* ICON — this is the key fix */
  .app-icon-wrapper {
    width: 56px;
    height: 56px;
    margin: 0 auto 10px;
    border-radius: 12px;
    overflow: hidden;
    background: #f0f8fa;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .app-icon-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block; /* removes inline gap */
    border: none;
    outline: none;
    /* kill any browser decoration */
    -webkit-user-drag: none;
  }

  /* hide broken-image icon */
  .app-icon-wrapper img.errored {
    display: none;
  }

  .app-icon-fallback {
    font-size: 28px;
    line-height: 1;
  }

  .app-name {
    font-size: 12px;
    font-weight: 600;
    color: #333;
    line-height: 1.3;
    word-break: break-word;
  }

  /* ADD CARD */
  .add-card {
    background: white;
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    border: 2px dashed #ccc;
    color: #999;
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 100px;
  }

  .add-card:hover {
    border-color: #4E8D99;
    color: #4E8D99;
    background: #f0f8fa;
  }

  .add-card-plus { font-size: 24px; font-weight: 300; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 700;
    color: #4E8D99;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e9ecef;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: #4E8D99; }

  .icon-preview-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .icon-preview-box {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: #f0f8fa;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 2px solid #e9ecef;
    flex-shrink: 0;
  }

  .icon-preview-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .icon-preview-box .fallback-emoji { font-size: 28px; }

  .icon-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .icon-tab-btns {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  .icon-tab-btn {
    padding: 5px 10px;
    border-radius: 6px;
    border: 2px solid #e9ecef;
    background: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    transition: all 0.2s;
  }

  .icon-tab-btn.active {
    border-color: #4E8D99;
    background: #4E8D99;
    color: white;
  }

  .icon-input-area { display: none; }
  .icon-input-area.active { display: block; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* CATEGORY EDIT */
  .category-edit-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: #aaa;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s;
  }

  .category-edit-btn:hover { color: #4E8D99; }

  /* DRAG HANDLE */
  .drag-handle {
    position: absolute;
    top: 6px;
    left: 6px;
    font-size: 14px;
    color: #ccc;
    cursor: grab;
    display: none;
  }

  .app-card:hover .drag-handle { display: block; }

  /* EDIT MODE */
  .edit-mode .app-card { border: 2px dashed #EBBA95; }

  /* DIVIDER */
  .section-divider {
    border: none;
    border-top: 1px solid #e9ecef;
    margin: 8px 0 16px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #4E8D99;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ADD CATEGORY */
  .add-category-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: white;
    border: 2px dashed #ccc;
    border-radius: 8px;
    cursor: pointer;
    color: #999;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 24px;
    transition: all 0.2s;
  }

  .add-category-btn:hover { border-color: #4E8D99; color: #4E8D99; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .main { padding: 16px; }
    .header { padding: 12px 16px; }
    .header-title { font-size: 18px; }
    .app-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-area">
    <img src="https://jenniferdenton-droid.github.io/Moxie-Dashboard/moxie-logo.png"
         onerror="this.style.display='none'"
         alt="Moxie">
    <span class="header-title">Moxie Dashboard</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="openAddModal()">+ Add App</button>
    <button class="btn btn-secondary" onclick="openAddCategoryModal()">+ Category</button>
    <button class="btn btn-primary" onclick="exportConfig()">Export</button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍  Search apps..." oninput="renderAll()">
</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <!-- rendered by JS -->
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADD/EDIT APP MODAL -->
<div class="modal-overlay hidden" id="appModal">
  <div class="modal">
    <h2 id="modalTitle">Add App</h2>

    <div class="form-group">
      <label>App Name *</label>
      <input type="text" id="appName" placeholder="e.g. Gmail">
    </div>

    <div class="form-group">
      <label>URL *</label>
      <input type="url" id="appUrl" placeholder="https://...">
    </div>

    <div class="form-group">
      <label>Category</label>
      <select id="appCategory"></select>
    </div>

    <div class="form-group">
      <label>Icon</label>
      <div class="icon-preview-row">
        <div class="icon-preview-box" id="iconPreviewBox">
          <span class="fallback-emoji" id="iconPreviewEmoji">🔗</span>
        </div>
        <div style="flex:1">
          <div class="icon-tab-btns">
            <button class="icon-tab-btn active" onclick="switchIconTab('url', this)">URL</button>
            <button class="icon-tab-btn" onclick="switchIconTab('upload', this)">Upload</button>
            <button class="icon-tab-btn" onclick="switchIconTab('favicon', this)">Auto</button>
          </div>
          <div class="icon-input-area active" id="iconTabUrl">
            <input type="url" id="iconUrl" placeholder="https://...icon.png" oninput="previewIconUrl()">
          </div>
          <div class="icon-input-area" id="iconTabUpload">
            <input type="file" id="iconFile" accept="image/*" onchange="previewIconFile()">
          </div>
          <div class="icon-input-area" id="iconTabFavicon">
            <small style="color:#666">Auto-fetches favicon from the URL above when you save.</small>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('appModal')">Cancel</button>
      <button class="btn btn-primary" id="saveAppBtn" onclick="saveApp()">Save App</button>
    </div>
  </div>
</div>

<!-- ADD CATEGORY MODAL -->
<div class="modal-overlay hidden" id="categoryModal">
  <div class="modal">
    <h2>Add Category</h2>
    <div class="form-group">
      <label>Category Name *</label>
      <input type="text" id="catName" placeholder="e.g. Design Tools">
    </div>
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input type="text" id="catEmoji" placeholder="e.g. 🎨" maxlength="4">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('categoryModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategory()">Save Category</button>
    </div>
  </div>
</div>

const STORAGE_KEY_ORDER      = 'moxieDash_order';

function getCategories() {
  const extra = JSON.parse(localStorage.getItem(STORAGE_KEY_EXTRA_CATS) || '[]');
  // merge: extra cats added by this user
  const ids = new Set(DEFAULT_CATEGORIES.map(c => c.id));
  const merged = [...DEFAULT_CATEGORIES];
  extra.forEach(c => { if (!ids.has(c.id)) merged.push(c); });
  return merged;
}

function getApps() {
  const extra = JSON.parse(localStorage.getItem(STORAGE_KEY_EXTRA_APPS) || '[]');
  const ids = new Set(DEFAULT_APPS.map(a => a.id));
  const merged = [...DEFAULT_APPS];
  extra.forEach(a => { if (!ids.has(a.id)) merged.push(a); });
  return merged;
}

function saveExtraApps(apps) {
  // only save apps that aren't in DEFAULT
  const defaultIds = new Set(DEFAULT_APPS.map(a => a.id));
  const extra = apps.filter(a => !defaultIds.has(a.id));
  localStorage.setItem(STORAGE_KEY_EXTRA_APPS, JSON.stringify(extra));
}

function saveExtraCats(cats) {
  const defaultIds = new Set(DEFAULT_CATEGORIES.map(c => c.id));
  const extra = cats.filter(c => !defaultIds.has(c.id));
  localStorage.setItem(STORAGE_KEY_EXTRA_CATS, JSON.stringify(extra));
}

// ============================================================
// RENDER
// ============================================================
function renderAll() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const categories = getCategories();
  const apps = getApps();
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  // add-category button
  const addCatBtn = document.createElement('button');
  addCatBtn.className = 'add-category-btn';
  addCatBtn.innerHTML = '＋ Add Category';
  addCatBtn.onclick = openAddCategoryModal;
  main.appendChild(addCatBtn);

  categories.forEach(cat => {
    let catApps = apps.filter(a => a.category === cat.id);
    if (query) catApps = catApps.filter(a => a.name.toLowerCase().includes(query));
    // show category even if empty (when not searching)
    if (query && catApps.length === 0) return;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.id = 'cat-' + cat.id;

    section.innerHTML = `
      <div class="category-header">
        <span class="category-icon">${cat.icon || '📁'}</span>
        <span class="category-name">${cat.name}</span>
        <span class="category-count">${catApps.length}</span>
        <button class="category-edit-btn" onclick="editCategory('${cat.id}')" title="Edit category">✏️</button>
        <button class="category-edit-btn" onclick="deleteCategory('${cat.id}')" title="Delete category" style="color:#e74c3c">🗑</button>
      </div>
      <div class="app-grid" id="grid-${cat.id}"></div>
    `;

    main.appendChild(section);

    const grid = section.querySelector('#grid-' + cat.id);
    catApps.forEach(app => grid.appendChild(makeAppCard(app)));

    // Add App button inside each category
    const addCard = document.createElement('div');
    addCard.className = 'add-card';
    addCard.onclick = () => openAddModal(cat.id);
    addCard.innerHTML = `<span class="add-card-plus">＋</span><span>Add App</span>`;
    grid.appendChild(addCard);
  });
}

function makeAppCard(app) {
  const a = document.createElement('a');
  a.className = 'app-card';
  a.href = app.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.title = app.name;

  // icon wrapper — no link decoration leaks out
  const wrapper = document.createElement('div');
  wrapper.className = 'app-icon-wrapper';

  if (app.icon && app.icon.trim()) {
    const img = document.createElement('img');
    img.src = app.icon;
    img.alt = app.name;
    img.addEventListener('error', () => {
      img.style.display = 'none';
      const fb = document.createElement('span');
      fb.className = 'app-icon-fallback';
      fb.textContent = app.name.charAt(0).toUpperCase();
      wrapper.appendChild(fb);
    });
    wrapper.appendChild(img);
  } else {
    const fb = document.createElement('span');
    fb.className = 'app-icon-fallback';
    fb.textContent = app.name.charAt(0).toUpperCase();
    wrapper.appendChild(fb);
  }

  const nameEl = document.createElement('div');
  nameEl.className = 'app-name';
  nameEl.textContent = app.name;

  // hover actions
  const actions = document.createElement('div');
  actions.className = 'app-card-actions';
  actions.innerHTML = `
    <button class="card-btn" onclick="event.preventDefault();event.stopPropagation();editApp('${app.id}')" title="Edit">✏️</button>
    <button class="card-btn delete" onclick="event.preventDefault();event.stopPropagation();deleteApp('${app.id}')" title="Delete">✕</button>
  `;

  a.appendChild(actions);
  a.appendChild(wrapper);
  a.appendChild(nameEl);
  return a;
}

// ============================================================
// ADD / EDIT APP MODAL
// ============================================================
let editingAppId = null;
let currentIconData = '';
let currentIconTab = 'url';

function openAddModal(categoryId) {
  editingAppId = null;
  currentIconData = '';
  document.getElementById('modalTitle').textContent = 'Add App';
  document.getElementById('saveAppBtn').textContent = 'Save App';
  document.getElementById('appName').value = '';
  document.getElementById('appUrl').value = '';
  document.getElementById('iconUrl').value = '';
  document.getElementById('iconFile').value = '';
  updateIconPreview('');
  populateCategorySelect(categoryId || '');
  switchIconTab('url');
  document.getElementById('appModal').classList.remove('hidden');
}

function editApp(id) {
  const apps = getApps();
  const app = apps.find(a => a.id === id);
  if (!app) return;
  editingAppId = id;
  currentIconData = app.icon || '';
  document.getElementById('modalTitle').textContent = 'Edit App';
  document.getElementById('saveAppBtn').textContent = 'Update App';
  document.getElementById('appName').value = app.name;
  document.getElementById('appUrl').value = app.url;
  document.getElementById('iconUrl').value = app.icon && !app.icon.startsWith('data:') ? app.icon : '';
  updateIconPreview(app.icon || '');
  populateCategorySelect(app.category);
  switchIconTab('url');
  document.getElementById('appModal').classList.remove('hidden');
}

function saveApp() {
  const name = document.getElementById('appName').value.trim();
  const url  = document.getElementById('appUrl').value.trim();
  const cat  = document.getElementById('appCategory').value;

  if (!name || !url) { showToast('Name and URL are required', true); return; }

  // resolve icon
  let icon = currentIconData;
  if (!icon && currentIconTab === 'favicon') {
    try {
      const domain = new URL(url).origin;
      icon = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
    } catch(e) {}
  }

  const apps = getApps();
  if (editingAppId) {
    // find and update
    const idx = apps.findIndex(a => a.id === editingAppId);
    if (idx !== -1) {
      apps[idx] = { ...apps[idx], name, url, category: cat, icon };
    }
  } else {
    apps.push({ id: 'app_' + Date.now(), name, url, category: cat, icon });
  }

  saveExtraApps(apps);
  closeModal('appModal');
  renderAll();
  showToast(editingAppId ? 'App updated!' : 'App added!');
}

function deleteApp(id) {
  if (!confirm('Remove this app from your dashboard?')) return;
  // If it's a default app, we need to store it in a "removed" list
  const defaultIds = new Set(DEFAULT_APPS.map(a => a.id));
  if (defaultIds.has(id)) {
    const removed = JSON.parse(localStorage.getItem('moxieDash_removed') || '[]');
    if (!removed.includes(id)) removed.push(id);
    localStorage.setItem('moxieDash_removed', JSON.stringify(removed));
  } else {
    const extra = JSON.parse(localStorage.getItem(STORAGE_KEY_EXTRA_APPS) || '[]');
    const filtered = extra.filter(a => a.id !== id);
    localStorage.setItem(STORAGE_KEY_EXTRA_APPS, JSON.stringify(filtered));
  }
  renderAll();
  showToast('App removed');
}

// Override getApps to respect removed list
const _baseGetApps = getApps;
window.getApps = function() {
  const removed = JSON.parse(localStorage.getItem('moxieDash_removed') || '[]');
  return _baseGetApps().filter(a => !removed.includes(a.id));
};

// ============================================================
// ICON HANDLING
// ============================================================
function switchIconTab(tab, btn) {
  currentIconTab = tab;
  ['url','upload','favicon'].forEach(t => {
    document.getElementById('iconTab' + t.charAt(0).toUpperCase() + t.slice(1))
      .classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.icon-tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['url','upload','favicon'][i] === tab);
  });
}

function previewIconUrl() {
  const url = document.getElementById('iconUrl').value.trim();
  currentIconData = url;
  updateIconPreview(url);
}

function previewIconFile() {
  const file = document.getElementById('iconFile').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentIconData = e.target.result;
    updateIconPreview(e.target.result);
  };
  reader.readAsDataURL(file);
}

function updateIconPreview(src) {
  const box = document.getElementById('iconPreviewBox');
  const emoji = document.getElementById('iconPreviewEmoji');
  if (src) {
    box.innerHTML = `<img src="${src}" alt="preview" style="width:100%;height:100%;object-fit:contain;display:block" onerror="this.style.display='none'">`;
  } else {
    box.innerHTML = `<span class="fallback-emoji" id="iconPreviewEmoji">🔗</span>`;
  }
}

// ============================================================
// CATEGORIES
// ============================================================
function openAddCategoryModal() {
  document.getElementById('catName').value = '';
  document.getElementById('catEmoji').value = '';
  document.getElementById('categoryModal').classList.remove('hidden');
}

function saveCategory() {
  const name = document.getElementById('catName').value.trim();
  const icon = document.getElementById('catEmoji').value.trim() || '📁';
  if (!name) { showToast('Category name required', true); return; }
  const cats = getCategories();
  const newCat = { id: 'cat_' + Date.now(), name, icon };
  cats.push(newCat);
  saveExtraCats(cats);
  closeModal('categoryModal');
  renderAll();
  showToast('Category added!');
}

function editCategory(id) {
  const cats = getCategories();
  const cat = cats.find(c => c.id === id);
  if (!cat) return;
  const name = prompt('Category name:', cat.name);
  if (name === null) return;
  const icon = prompt('Icon (emoji):', cat.icon || '📁');
  cat.name = name.trim() || cat.name;
  cat.icon = icon ? icon.trim() : cat.icon;
  saveExtraCats(cats);
  renderAll();
  showToast('Category updated!');
}

function deleteCategory(id) {
  const defaultIds = new Set(DEFAULT_CATEGORIES.map(c => c.id));
  if (defaultIds.has(id)) {
    showToast('Cannot delete a default category', true);
    return;
  }
  if (!confirm('Delete this category? Apps in it will remain but be uncategorised.')) return;
  const extra = JSON.parse(localStorage.getItem(STORAGE_KEY_EXTRA_CATS) || '[]');
  localStorage.setItem(STORAGE_KEY_EXTRA_CATS, JSON.stringify(extra.filter(c => c.id !== id)));
  renderAll();
  showToast('Category deleted');
}

function populateCategorySelect(selectedId) {
  const sel = document.getElementById('appCategory');
  sel.innerHTML = '';
  getCategories().forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = (cat.icon || '') + ' ' + cat.name;
    if (cat.id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ============================================================
// EXPORT — copies full config so you can paste into code
// ============================================================
function exportConfig() {
  const data = {
    extraApps: JSON.parse(localStorage.getItem(STORAGE_KEY_EXTRA_APPS) || '[]'),
    extraCats: JSON.parse(localStorage.getItem(STORAGE_KEY_EXTRA_CATS) || '[]'),
    removed:   JSON.parse(localStorage.getItem('moxieDash_removed') || '[]'),
  };
  const json = JSON.stringify(data, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    showToast('Config copied to clipboard!');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = json;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Config copied!');
  });
}

// ============================================================
// UTILITIES
// ============================================================
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#e74c3c' : '#4E8D99';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.add('hidden'); });
});

// init
renderAll();
</script>
