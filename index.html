<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moxie Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f9fa;
    color: #333;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: white;
    border-bottom: 2px solid #EBBA95;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
    color: #4E8D99;
    letter-spacing: -0.5px;
  }

  .logo-subtitle {
    font-size: 13px;
    color: #6D445E;
    font-weight: 500;
  }

  .header-right {
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #4E8D99;
    color: white;
  }

  .btn-primary:hover { background: #3d7a86; transform: translateY(-1px); }

  .btn-secondary {
    background: #6D445E;
    color: white;
  }

  .btn-secondary:hover { background: #5a3750; transform: translateY(-1px); }

  .btn-outline {
    background: white;
    color: #4E8D99;
    border: 2px solid #4E8D99;
  }

  .btn-outline:hover { background: #f0f9fa; }

  /* MAIN CONTENT */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* CATEGORY SECTION */
  .category-section {
    margin-bottom: 40px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #EBBA95;
  }

  .category-icon { font-size: 20px; }

  .category-name {
    font-size: 18px;
    font-weight: 700;
    color: #4E8D99;
  }

  .category-count {
    font-size: 13px;
    color: #999;
    background: #f0f0f0;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .category-actions {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }

  .btn-sm {
    padding: 4px 10px;
    font-size: 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
  }

  .btn-sm-edit {
    background: #f0f9fa;
    color: #4E8D99;
    border: 1px solid #4E8D99;
  }

  .btn-sm-delete {
    background: #fff0f0;
    color: #e55;
    border: 1px solid #e55;
  }

  /* APPS GRID */
  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }

  /* APP CARD */
  .app-card {
    background: white;
    border-radius: 12px;
    padding: 20px 12px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid #eee;
    position: relative;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .app-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(78,141,153,0.18);
    border-color: #4E8D99;
  }

  .app-card-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
    gap: 4px;
  }

  .app-card:hover .app-card-actions { display: flex; }

  .card-btn {
    width: 24px;
    height: 24px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .card-btn-edit { background: #4E8D99; color: white; }
  .card-btn-delete { background: #e55; color: white; }

  .app-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    object-fit: contain;
    display: block;
    background: #f8f9fa;
    padding: 4px;
  }

  .app-icon-placeholder {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: linear-gradient(135deg, #4E8D99, #6D445E);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: white;
    font-weight: 700;
    flex-shrink: 0;
  }

  .app-name {
    font-size: 13px;
    font-weight: 600;
    color: #333;
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
  }

  /* DRAG AND DROP */
  .app-card.dragging {
    opacity: 0.4;
    transform: scale(0.95);
  }

  .app-card.drag-over {
    border: 2px dashed #4E8D99;
    background: #f0f9fa;
  }

  /* DIVIDER between categories */
  .category-divider {
    height: 1px;
    background: linear-gradient(to right, #EBBA95, transparent);
    margin: 8px 0 32px 0;
    display: none;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
    color: #4E8D99;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #eee;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus {
    border-color: #4E8D99;
  }

  /* IMAGE UPLOAD */
  .icon-upload-area {
    border: 2px dashed #ddd;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafafa;
  }

  .icon-upload-area:hover {
    border-color: #4E8D99;
    background: #f0f9fa;
  }

  .icon-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }

  .icon-preview img {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    object-fit: contain;
    border: 1px solid #eee;
    background: white;
    padding: 3px;
  }

  .icon-preview-text {
    font-size: 13px;
    color: #666;
  }

  .icon-clear-btn {
    padding: 4px 10px;
    background: #fff0f0;
    color: #e55;
    border: 1px solid #e55;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    margin-top: 6px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .modal-actions .btn { flex: 1; justify-content: center; }

  .btn-cancel {
    background: #f0f0f0;
    color: #666;
    border: none;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #333;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 9999;
    transform: translateY(100px);
    transition: transform 0.3s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  .toast.show { transform: translateY(0); }
  .toast.success { background: #4E8D99; }
  .toast.error { background: #e55; }

  /* EDIT CATEGORY MODAL */
  .category-edit-form {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  /* SEARCH */
  .search-bar {
    width: 100%;
    max-width: 400px;
    padding: 10px 16px;
    border: 2px solid #eee;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar:focus { border-color: #4E8D99; }

  .search-wrapper {
    margin-bottom: 28px;
  }

  .no-results {
    text-align: center;
    color: #999;
    padding: 40px;
    font-size: 15px;
  }

  /* DRAG HANDLE */
  .drag-handle {
    position: absolute;
    top: 6px;
    left: 6px;
    cursor: grab;
    font-size: 14px;
    color: #ccc;
    display: none;
  }

  .app-card:hover .drag-handle { display: block; }

  /* EMPTY CATEGORY MESSAGE */
  .empty-category {
    color: #bbb;
    font-size: 13px;
    font-style: italic;
    padding: 10px 0;
  }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .main { padding: 20px 12px; }
    .apps-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
  }
</style>
</head>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div>
      <div class="logo-text">Moxie</div>
      <div class="logo-subtitle">Dashboard</div>
    </div>
  </div>
  <div style="flex:1; display:flex; justify-content:center; padding:0 20px;">
    <input class="search-bar" id="searchBar" placeholder="🔍 Search apps..." oninput="renderDashboard()">
  </div>
  <div class="header-right">
    <button class="btn btn-outline" onclick="openCategoryModal()">＋ Category</button>
    <button class="btn btn-primary" onclick="openAddModal()">＋ Add App</button>
    <button class="btn btn-secondary" onclick="exportData()">⬇ Export</button>
    <button class="btn btn-outline" onclick="triggerImport()">⬆ Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<!-- MAIN -->
<div class="main" id="dashboardMain"></div>

<!-- ADD/EDIT APP MODAL -->
<div class="modal-overlay" id="appModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add App</div>
    
    <div class="form-group">
      <label class="form-label">App Name *</label>
      <input class="form-input" id="appName" placeholder="e.g. Gmail">
    </div>

    <div class="form-group">
      <label class="form-label">URL *</label>
      <input class="form-input" id="appUrl" placeholder="https://...">
    </div>

    <div class="form-group">
      <label class="form-label">Category *</label>
      <select class="form-select" id="appCategory"></select>
    </div>

    <div class="form-group">
      <label class="form-label">Icon / Logo</label>
      <div class="icon-upload-area" onclick="document.getElementById('iconFileInput').click()">
        <div style="font-size:13px; color:#999;">Click to upload image (PNG, JPG, SVG)</div>
        <div style="font-size:11px; color:#bbb; margin-top:4px;">or paste an image URL below</div>
      </div>
      <input type="file" id="iconFileInput" accept="image/*" style="display:none" onchange="handleIconUpload(event)">
      
      <div id="iconPreviewArea" style="display:none" class="icon-preview">
        <img id="iconPreviewImg" src="" alt="Icon preview">
        <div>
          <div class="icon-preview-text" id="iconPreviewName">Image selected</div>
          <button class="icon-clear-btn" onclick="clearIcon()">✕ Remove</button>
        </div>
      </div>

      <input class="form-input" id="appIconUrl" placeholder="Or paste icon URL here..." 
        style="margin-top:8px;" oninput="handleIconUrl(this.value)">
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeAppModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveApp()" id="saveAppBtn">Save App</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT CATEGORY MODAL -->
<div class="modal-overlay" id="categoryModal">
  <div class="modal">
    <div class="modal-title" id="catModalTitle">Add Category</div>
    
    <div class="form-group">
      <label class="form-label">Category Name *</label>
      <input class="form-input" id="catName" placeholder="e.g. Design Tools">
    </div>

    <div class="form-group">
      <label class="form-label">Emoji Icon</label>
      <input class="form-input" id="catEmoji" placeholder="e.g. 🎨" maxlength="4">
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeCategoryModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategory()">Save Category</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// STORAGE
// ============================================================
function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const d = JSON.parse(saved);
      categories = d.categories || [...DEFAULT_CATEGORIES];
      apps = d.apps || [...DEFAULT_APPS];
    } else {
      categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
      apps = JSON.parse(JSON.stringify(DEFAULT_APPS));
      saveData();
    }
  } catch(e) {
    categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    apps = JSON.parse(JSON.stringify(DEFAULT_APPS));
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ categories, apps }));
}

// ============================================================
// RENDER
// ============================================================
function renderDashboard() {
  const search = (document.getElementById('searchBar')?.value || '').toLowerCase().trim();
  const main = document.getElementById('dashboardMain');
  
  let html = '';
  let hasResults = false;

  categories.forEach((cat, idx) => {
    const catApps = apps.filter(a => {
      const inCat = a.category === cat.id;
      if (!search) return inCat;
      return inCat && (a.name.toLowerCase().includes(search) || a.url.toLowerCase().includes(search));
    });

    if (search && catApps.length === 0) return;
    hasResults = true;

    html += `
      <div class="category-section" data-cat-id="${cat.id}">
        <div class="category-header">
          <span class="category-icon">${cat.icon || cat.emoji || '📁'}</span>
          <span class="category-name">${escHtml(cat.name)}</span>
          <span class="category-count">${catApps.length}</span>
          <div class="category-actions">
            <button class="btn-sm btn-sm-edit" onclick="openEditCategoryModal('${cat.id}')">✏️ Edit</button>
            <button class="btn-sm btn-sm-delete" onclick="deleteCategory('${cat.id}')">🗑 Delete</button>
          </div>
        </div>
        <div class="apps-grid" id="grid-${cat.id}">
    `;

    if (catApps.length === 0) {
      html += `<div class="empty-category">No apps in this category yet.</div>`;
    } else {
      catApps.forEach(app => {
        html += renderAppCard(app);
      });
    }

    html += `</div></div>`;
  });

  if (!hasResults) {
    html = `<div class="no-results">No apps found for "<strong>${escHtml(search)}</strong>"</div>`;
  }

  main.innerHTML = html;
  setupDragAndDrop();
}

function renderAppCard(app) {
  const iconHtml = app.icon
    ? `<img class="app-icon" src="${escHtml(app.icon)}" alt="${escHtml(app.name)}" 
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="app-icon-placeholder" style="display:none">${escHtml(app.name.charAt(0))}</div>`
    : `<div class="app-icon-placeholder">${escHtml(app.name.charAt(0))}</div>`;

  return `
    <div class="app-card" draggable="true" data-app-id="${app.id}" 
         onclick="openApp('${escHtml(app.url)}')">
      <span class="drag-handle" onclick="event.stopPropagation()" title="Drag to reorder">⠿</span>
      <div class="app-card-actions">
        <button class="card-btn card-btn-edit" onclick="event.stopPropagation(); openEditModal('${app.id}')" title="Edit">✏</button>
        <button class="card-btn card-btn-delete" onclick="event.stopPropagation(); deleteApp('${app.id}')" title="Delete">✕</button>
      </div>
      ${iconHtml}
      <div class="app-name">${escHtml(app.name)}</div>
    </div>
  `;
}

function openApp(url) {
  window.open(url, '_blank');
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// DRAG AND DROP
// ============================================================
function setupDragAndDrop() {
  document.querySelectorAll('.app-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrcId = card.dataset.appId;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.app-card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const targetId = card.dataset.appId;
      if (dragSrcId && targetId && dragSrcId !== targetId) {
        reorderApps(dragSrcId, targetId);
      }
    });
  });
}

function reorderApps(srcId, targetId) {
  const srcIdx = apps.findIndex(a => a.id === srcId);
  const tgtIdx = apps.findIndex(a => a.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;
  const [moved] = apps.splice(srcIdx, 1);
  // Also update category to match the target's category
  moved.category = apps[tgtIdx > srcIdx ? tgtIdx - 1 : tgtIdx].category || moved.category;
  apps.splice(tgtIdx, 0, moved);
  saveData();
  renderDashboard();
  showToast('App moved!', 'success');
}

// ============================================================
// APP MODAL
// ============================================================
function openAddModal() {
  editingAppId = null;
  currentIconData = null;
  document.getElementById('modalTitle').textContent = 'Add App';
  document.getElementById('appName').value = '';
  document.getElementById('appUrl').value = '';
  document.getElementById('appIconUrl').value = '';
  document.getElementById('saveAppBtn').textContent = 'Save App';
  clearIconPreview();
  populateCategorySelect();
  document.getElementById('appModal').classList.add('active');
  document.getElementById('appName').focus();
}

function openEditModal(appId) {
  const app = apps.find(a => a.id === appId);
  if (!app) return;
  editingAppId = appId;
  currentIconData = app.icon || null;
  document.getElementById('modalTitle').textContent = 'Edit App';
  document.getElementById('appName').value = app.name;
  document.getElementById('appUrl').value = app.url;
  document.getElementById('appIconUrl').value = (app.icon && !app.icon.startsWith('data:')) ? app.icon : '';
  document.getElementById('saveAppBtn').textContent = 'Update App';
  populateCategorySelect(app.category);
  
  if (app.icon) {
    showIconPreview(app.icon, 'Current icon');
  } else {
    clearIconPreview();
  }
  
  document.getElementById('appModal').classList.add('active');
  document.getElementById('appName').focus();
}

function closeAppModal() {
  document.getElementById('appModal').classList.remove('active');
  editingAppId = null;
  currentIconData = null;
}

function populateCategorySelect(selectedId) {
  const sel = document.getElementById('appCategory');
  sel.innerHTML = categories.map(c =>
    `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${c.icon || ''} ${c.name}</option>`
  ).join('');
}

function saveApp() {
  const name = document.getElementById('appName').value.trim();
  const url = document.getElementById('appUrl').value.trim();
  const category = document.getElementById('appCategory').value;
  const urlInput = document.getElementById('appIconUrl').value.trim();

  if (!name) { showToast('Please enter an app name', 'error'); return; }
  if (!url) { showToast('Please enter a URL', 'error'); return; }

  let finalIcon = currentIconData || urlInput || '';

  if (editingAppId) {
    const idx = apps.findIndex(a => a.id === editingAppId);
    if (idx !== -1) {
      apps[idx] = { ...apps[idx], name, url, category, icon: finalIcon };
    }
    showToast('App updated!', 'success');
  } else {
    apps.push({
      id: 'app_' + Date.now(),
      name, url, category,
      icon: finalIcon
    });
    showToast('App added!', 'success');
  }

  saveData();
  closeAppModal();
  renderDashboard();
}

function deleteApp(appId) {
  if (!confirm('Delete this app?')) return;
  apps = apps.filter(a => a.id !== appId);
  saveData();
  renderDashboard();
  showToast('App deleted', 'success');
}

// ============================================================
// ICON HANDLING - NO LINK ICON, CLEAN IMAGE ONLY
// ============================================================
function handleIconUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  if (file.size > 2 * 1024 * 1024) {
    showToast('Image too large. Max 2MB.', 'error');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    currentIconData = e.target.result;
    document.getElementById('appIconUrl').value = '';
    showIconPreview(currentIconData, file.name);
  };
  reader.readAsDataURL(file);
}

function handleIconUrl(url) {
  if (url.trim()) {
    currentIconData = null;
    showIconPreview(url.trim(), 'URL icon');
  } else {
    clearIconPreview();
  }
}

function showIconPreview(src, name) {
  const area = document.getElementById('iconPreviewArea');
  const img = document.getElementById('iconPreviewImg');
  const nameEl = document.getElementById('iconPreviewName');
  img.src = src;
  nameEl.textContent = name;
  area.style.display = 'flex';
}

function clearIcon() {
  currentIconData = null;
  document.getElementById('appIconUrl').value = '';
  document.getElementById('iconFileInput').value = '';
  clearIconPreview();
}

function clearIconPreview() {
  const area = document.getElementById('iconPreviewArea');
  area.style.display = 'none';
  document.getElementById('iconPreviewImg').src = '';
}

// ============================================================
// CATEGORY MODAL
// ============================================================
function openCategoryModal() {
  editingCatId = null;
  document.getElementById('catModalTitle').textContent = 'Add Category';
  document.getElementById('catName').value = '';
  document.getElementById('catEmoji').value = '';
  document.getElementById('categoryModal').classList.add('active');
  document.getElementById('catName').focus();
}

function openEditCategoryModal(catId) {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  editingCatId = catId;
  document.getElementById('catModalTitle').textContent = 'Edit Category';
  document.getElementById('catName').value = cat.name;
  document.getElementById('catEmoji').value = cat.icon || cat.emoji || '';
  document.getElementById('categoryModal').classList.add('active');
}

function closeCategoryModal() {
  document.getElementById('categoryModal').classList.remove('active');
  editingCatId = null;
}

function saveCategory() {
  const name = document.getElementById('catName').value.trim();
  const icon = document.getElementById('catEmoji').value.trim() || '📁';

  if (!name) { showToast('Please enter a category name', 'error'); return; }

  if (editingCatId) {
    const idx = categories.findIndex(c => c.id === editingCatId);
    if (idx !== -1) { categories[idx] = { ...categories[idx], name, icon }; }
    showToast('Category updated!', 'success');
  } else {
    categories.push({ id: 'cat_' + Date.now(), name, icon });
    showToast('Category added!', 'success');
  }

  saveData();
  closeCategoryModal();
  renderDashboard();
}

function deleteCategory(catId) {
  const cat = categories.find(c => c.id === catId);
  const appCount = apps.filter(a => a.category === catId).length;
  
  if (!confirm(`Delete category "${cat?.name}"? ${appCount > 0 ? `The ${appCount} apps in it will be uncategorized.` : ''}`)) return;
  
  categories = categories.filter(c => c.id !== catId);
  // Move apps to first remaining category or remove category
  if (categories.length > 0) {
    apps = apps.map(a => a.category === catId ? { ...a, category: categories[0].id } : a);
  }
  saveData();
  renderDashboard();
  showToast('Category deleted', 'success');
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
  const data = JSON.stringify({ categories, apps }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'moxie-dashboard-backup.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported!', 'success');
}

function triggerImport() {
  document.getElementById('importFile').click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const d = JSON.parse(e.target.result);
      if (d.categories && d.apps) {
        if (!confirm(`Import ${d.apps.length} apps and ${d.categories.length} categories? This will replace your current dashboard.`)) return;
        categories = d.categories;
        apps = d.apps;
        saveData();
        renderDashboard();
        showToast('Data imported successfully!', 'success');
      } else {
        showToast('Invalid file format', 'error');
      }
    } catch(err) {
      showToast('Could not read file', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeAppModal();
    closeCategoryModal();
  }
  if (e.key === 'Enter' && document.getElementById('appModal').classList.contains('active')) {
    saveApp();
  }
});

// Close modal on overlay click
document.getElementById('appModal').addEventListener('click', function(e) {
  if (e.target === this) closeAppModal();
});
document.getElementById('categoryModal').addEventListener('click', function(e) {
  if (e.target === this) closeCategoryModal();
});

// ============================================================
// INIT
// ============================================================
loadData();
renderDashboard();
</script>
</body>
</html>
