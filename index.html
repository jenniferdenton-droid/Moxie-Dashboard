<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moxie Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f9fa;
    color: #333;
    min-height: 100vh;
  }

  .header {
    background: white;
    padding: 16px 32px;
    border-bottom: 2px solid #EBBA95;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-area img {
    height: 36px;
    object-fit: contain;
  }

  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: #4E8D99;
    letter-spacing: -0.5px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-box {
    padding: 8px 16px;
    border: 1.5px solid #ddd;
    border-radius: 20px;
    font-size: 14px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: #4E8D99; }

  .btn {
    padding: 8px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #4E8D99;
    color: white;
  }

  .btn-primary:hover { background: #3d7a85; }

  .btn-secondary {
    background: #6D445E;
    color: white;
  }

  .btn-secondary:hover { background: #5a3650; }

  .main {
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .category-section {
    margin-bottom: 36px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #EBBA95;
  }

  .category-icon { font-size: 20px; }

  .category-name {
    font-size: 18px;
    font-weight: 700;
    color: #4E8D99;
  }

  .category-count {
    background: #EBBA95;
    color: #6D445E;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 14px;
  }

  .app-card {
    background: white;
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    border: 1.5px solid #eee;
    transition: all 0.2s;
    position: relative;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .app-card:hover {
    border-color: #4E8D99;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(78,141,153,0.15);
  }

  .app-icon-wrapper {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f4f5;
  }

  .app-icon-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .app-name {
    font-size: 12px;
    font-weight: 600;
    color: #333;
    line-height: 1.3;
    word-break: break-word;
  }

  .card-menu-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: #bbb;
    font-size: 14px;
    padding: 2px 5px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .app-card:hover .card-menu-btn { opacity: 1; }
  .card-menu-btn:hover { color: #4E8D99; background: #f0f4f5; }

  /* Modal Styles */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 460px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .modal h2 {
    font-size: 18px;
    font-weight: 700;
    color: #4E8D99;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: #4E8D99; }

  .icon-preview-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }

  .icon-preview {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: #f0f4f5;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1.5px solid #eee;
    flex-shrink: 0;
  }

  .icon-preview img { width: 100%; height: 100%; object-fit: contain; }

  .upload-btn {
    padding: 8px 14px;
    background: #f0f4f5;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    transition: all 0.2s;
  }

  .upload-btn:hover { border-color: #4E8D99; color: #4E8D99; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 10px 20px;
    border: 1.5px solid #ddd;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #666;
  }

  .btn-save {
    padding: 10px 20px;
    background: #4E8D99;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }

  .btn-delete {
    padding: 10px 20px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    margin-right: auto;
  }

  .divider {
    height: 1px;
    background: #eee;
    margin: 16px 0;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #aaa;
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #4E8D99;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    .main { padding: 16px; }
    .header { padding: 12px 16px; }
    .apps-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .search-box { width: 140px; }
    .header-title { font-size: 17px; }
  }
</style>
</head>

  <div class="header-right">
    <input type="text" class="search-box" placeholder="🔍 Search apps..." id="searchInput" oninput="filterApps()" />
    <button class="btn btn-primary" onclick="openAddModal()">+ Add App</button>
    <button class="btn btn-secondary" onclick="openCategoryModal()">+ Category</button>
  </div>

<div class="main" id="mainContent"></div>
<div class="toast" id="toast"></div>

<!-- Add/Edit App Modal -->
<div class="modal-overlay" id="appModal">
  <div class="modal">
    <h2 id="modalTitle">Add New App</h2>
    <div class="form-group">
      <label>App Name *</label>
      <input type="text" id="appName" placeholder="e.g. Gmail" />
    </div>
    <div class="form-group">
      <label>URL *</label>
      <input type="text" id="appUrl" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="appCategory"></select>
    </div>
    <div class="form-group">
      <label>Icon</label>
      <div class="icon-preview-row">
        <div class="icon-preview" id="iconPreview">
          <img id="iconPreviewImg" src="" style="display:none" />
        </div>
        <div>
          <input type="file" id="iconFile" accept="image/*" style="display:none" onchange="handleIconUpload()" />
          <button class="upload-btn" onclick="document.getElementById('iconFile').click()">📁 Upload Image</button>
          <div style="margin-top:6px">
            <input type="text" id="iconUrl" placeholder="Or paste icon URL" style="width:100%;padding:8px;border:1.5px solid #ddd;border-radius:6px;font-size:13px" oninput="previewIconUrl()" />
          </div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="modal-actions">
      <button class="btn-delete" id="deleteBtn" onclick="deleteApp()" style="display:none">🗑 Delete</button>
      <button class="btn-cancel" onclick="closeModal('appModal')">Cancel</button>
      <button class="btn-save" onclick="saveApp()">Save App</button>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="categoryModal">
  <div class="modal">
    <h2>Add New Category</h2>
    <div class="form-group">
      <label>Category Name *</label>
      <input type="text" id="catName" placeholder="e.g. Marketing" />
    </div>
    <div class="form-group">
      <label>Emoji Icon</label>
      <input type="text" id="catEmoji" placeholder="e.g. 📊" maxlength="4" />
    </div>
    <div class="divider"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('categoryModal')">Cancel</button>
      <button class="btn-save" onclick="saveCategory()">Save Category</button>
    </div>
  </div>
</div>

<script>

  { id:"wbr", name:"WBR Reporting", url:"https://docs.google.com/spreadsheets/d/1POeaDXKcETvpy9DPN7GSWUztlp6P3USS2cOkA4oEyeE/edit?gid=1144010606#gid=1144010606", category:"operations",

    icon:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Notion_app_logo.png/512px-Notion_app_logo.png" }
];

// ============================================================
// STATE MANAGEMENT — merges built-in with any locally-added apps
// ============================================================
let categories = [];
let apps = [];
let editingAppId = null;
let currentIconData = "";

function loadData() {
  // Load categories: start with defaults, merge any custom ones saved locally
  const savedCats = JSON.parse(localStorage.getItem('md_extra_cats') || '[]');
  const savedApps = JSON.parse(localStorage.getItem('md_extra_apps') || '[]');
  const deletedIds = JSON.parse(localStorage.getItem('md_deleted_ids') || '[]');
  const editedApps = JSON.parse(localStorage.getItem('md_edited_apps') || '{}');

  // Build categories
  categories = [...DEFAULT_CATEGORIES];
  savedCats.forEach(c => {
    if (!categories.find(x => x.id === c.id)) categories.push(c);
  });

  // Build apps: start with defaults (minus deleted), apply edits, add extras
  apps = DEFAULT_APPS
    .filter(a => !deletedIds.includes(a.id))
    .map(a => editedApps[a.id] ? {...a, ...editedApps[a.id]} : a);

  savedApps.forEach(a => {
    if (!deletedIds.includes(a.id)) {
      const idx = apps.findIndex(x => x.id === a.id);
      if (idx >= 0) apps[idx] = editedApps[a.id] ? {...a, ...editedApps[a.id]} : a;
      else apps.push(editedApps[a.id] ? {...a, ...editedApps[a.id]} : a);
    }
  });
}

function saveExtra() {
  // We only save things ADDED or CHANGED locally
  const defaultIds = DEFAULT_APPS.map(a => a.id);
  const extraApps = apps.filter(a => !defaultIds.includes(a.id));
  localStorage.setItem('md_extra_apps', JSON.stringify(extraApps));
}

function saveEdited(app) {
  const edited = JSON.parse(localStorage.getItem('md_edited_apps') || '{}');
  edited[app.id] = app;
  localStorage.setItem('md_edited_apps', JSON.stringify(edited));
}

function saveDeleted(id) {
  const deleted = JSON.parse(localStorage.getItem('md_deleted_ids') || '[]');
  if (!deleted.includes(id)) deleted.push(id);
  localStorage.setItem('md_deleted_ids', JSON.stringify(deleted));
}

function saveExtraCategories() {
  const defaultIds = DEFAULT_CATEGORIES.map(c => c.id);
  const extra = categories.filter(c => !defaultIds.includes(c.id));
  localStorage.setItem('md_extra_cats', JSON.stringify(extra));
}

// ============================================================
// RENDER
// ============================================================
function render(filter = "") {
  const main = document.getElementById('mainContent');
  const q = filter.toLowerCase();

  let html = "";
  categories.forEach(cat => {
    const catApps = apps.filter(a => {
      const matchCat = a.category === cat.id;
      const matchSearch = !q || a.name.toLowerCase().includes(q);
      return matchCat && matchSearch;
    });
    if (catApps.length === 0 && q) return;

    html += `
      <div class="category-section">
        <div class="category-header">
          <span class="category-icon">${cat.icon || cat.emoji || "📁"}</span>
          <span class="category-name">${cat.name}</span>
          <span class="category-count">${catApps.length}</span>
        </div>
        <div class="apps-grid">
          ${catApps.map(app => renderCard(app)).join('')}
        </div>
      </div>
    `;
  });

  // Uncategorized
  const uncatApps = apps.filter(a => {
    const hasCategory = categories.find(c => c.id === a.category);
    const matchSearch = !q || a.name.toLowerCase().includes(q);
    return !hasCategory && matchSearch;
  });
  if (uncatApps.length > 0) {
    html += `
      <div class="category-section">
        <div class="category-header">
          <span class="category-icon">📁</span>
          <span class="category-name">Other</span>
          <span class="category-count">${uncatApps.length}</span>
        </div>
        <div class="apps-grid">
          ${uncatApps.map(app => renderCard(app)).join('')}
        </div>
      </div>
    `;
  }

  if (!html) {
    html = `<div class="empty-state"><div class="icon">🔍</div><div>No apps found</div></div>`;
  }

  main.innerHTML = html;
}

function renderCard(app) {
  const icon = app.icon || "";
  const isDataUrl = icon.startsWith('data:');
  const isHttpUrl = icon.startsWith('http');
  let imgHtml = "";

  if (isDataUrl || isHttpUrl) {
    imgHtml = `<img src="${icon}" alt="${app.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
               <span style="display:none;font-size:22px;align-items:center;justify-content:center;width:100%;height:100%">${app.name.charAt(0)}</span>`;
  } else {
    imgHtml = `<span style="font-size:22px;display:flex;align-items:center;justify-content:center;width:100%;height:100%">${app.name.charAt(0)}</span>`;
  }

  return `
    <a class="app-card" href="${app.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
      <button class="card-menu-btn" onclick="event.preventDefault(); event.stopPropagation(); openEditModal('${app.id}')">✏️</button>
      <div class="app-icon-wrapper">${imgHtml}</div>
      <div class="app-name">${app.name}</div>
    </a>
  `;
}

function filterApps() {
  const q = document.getElementById('searchInput').value;
  render(q);
}

// ============================================================
// MODALS
// ============================================================
function populateCategorySelect(selectedId) {
  const sel = document.getElementById('appCategory');
  sel.innerHTML = categories.map(c =>
    `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${c.icon || c.emoji || ''} ${c.name}</option>`
  ).join('');
}

function openAddModal() {
  editingAppId = null;
  currentIconData = "";
  document.getElementById('modalTitle').textContent = "Add New App";
  document.getElementById('appName').value = "";
  document.getElementById('appUrl').value = "";
  document.getElementById('iconUrl').value = "";
  document.getElementById('iconPreviewImg').style.display = "none";
  document.getElementById('deleteBtn').style.display = "none";
  document.getElementById('iconFile').value = "";
  populateCategorySelect(categories[0]?.id || "");
  document.getElementById('appModal').classList.add('active');
}

function openEditModal(id) {
  const app = apps.find(a => a.id === id);
  if (!app) return;
  editingAppId = id;
  currentIconData = app.icon || "";
  document.getElementById('modalTitle').textContent = "Edit App";
  document.getElementById('appName').value = app.name;
  document.getElementById('appUrl').value = app.url;
  document.getElementById('iconUrl').value = (app.icon && !app.icon.startsWith('data:')) ? app.icon : "";
  populateCategorySelect(app.category);
  document.getElementById('deleteBtn').style.display = "block";
  if (app.icon) {
    const img = document.getElementById('iconPreviewImg');
    img.src = app.icon;
    img.style.display = "block";
  } else {
    document.getElementById('iconPreviewImg').style.display = "none";
  }
  document.getElementById('appModal').classList.add('active');
}

function openCategoryModal() {
  document.getElementById('catName').value = "";
  document.getElementById('catEmoji').value = "";
  document.getElementById('categoryModal').classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function handleIconUpload() {
  const file = document.getElementById('iconFile').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentIconData = e.target.result;
    const img = document.getElementById('iconPreviewImg');
    img.src = currentIconData;
    img.style.display = "block";
    document.getElementById('iconUrl').value = "";
  };
  reader.readAsDataURL(file);
}

function previewIconUrl() {
  const url = document.getElementById('iconUrl').value.trim();
  if (url) {
    currentIconData = url;
    const img = document.getElementById('iconPreviewImg');
    img.src = url;
    img.style.display = "block";
  }
}

function saveApp() {
  const name = document.getElementById('appName').value.trim();
  const url = document.getElementById('appUrl').value.trim();
  const category = document.getElementById('appCategory').value;
  const urlInputIcon = document.getElementById('iconUrl').value.trim();
  const iconToSave = currentIconData || urlInputIcon || "";

  if (!name || !url) { showToast("Please enter a name and URL"); return; }

  if (editingAppId) {
    const idx = apps.findIndex(a => a.id === editingAppId);
    if (idx >= 0) {
      apps[idx] = { ...apps[idx], name, url, category, icon: iconToSave };
      saveEdited(apps[idx]);
      saveExtra();
    }
    showToast("App updated!");
  } else {
    const newApp = {
      id: "app_" + Date.now(),
      name, url, category,
      icon: iconToSave
    };
    apps.push(newApp);
    saveExtra();
    showToast("App added!");
  }

  closeModal('appModal');
  render(document.getElementById('searchInput').value);
}

function deleteApp() {
  if (!editingAppId) return;
  if (!confirm("Delete this app?")) return;
  saveDeleted(editingAppId);
  apps = apps.filter(a => a.id !== editingAppId);
  saveExtra();
  closeModal('appModal');
  render(document.getElementById('searchInput').value);
  showToast("App deleted");
}

function saveCategory() {
  const name = document.getElementById('catName').value.trim();
  const emoji = document.getElementById('catEmoji').value.trim();
  if (!name) { showToast("Please enter a category name"); return; }
  const newCat = {
    id: "cat_" + Date.now(),
    name,
    icon: emoji || "📁"
  };
  categories.push(newCat);
  saveExtraCategories();
  closeModal('categoryModal');
  render(document.getElementById('searchInput').value);
  showToast("Category added!");
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// ============================================================
// INIT
// ============================================================
loadData();
render();
</script>
