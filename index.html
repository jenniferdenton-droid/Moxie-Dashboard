<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moxie Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f9fa;
    color: #333;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #EBBA95;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo img {
    height: 36px;
    object-fit: contain;
  }

  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: #4E8D99;
    letter-spacing: -0.3px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: #4E8D99;
    color: white;
  }
  .btn-primary:hover { background: #3d7280; }

  .btn-secondary {
    background: white;
    color: #4E8D99;
    border: 2px solid #4E8D99;
  }
  .btn-secondary:hover { background: #f0f8f9; }

  .btn-danger {
    background: #e74c3c;
    color: white;
  }
  .btn-danger:hover { background: #c0392b; }

  /* SEARCH */
  .search-bar {
    padding: 20px 32px 0;
    max-width: 500px;
  }

  .search-input {
    width: 100%;
    padding: 10px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #4E8D99; }

  /* MAIN CONTENT */
  .main {
    padding: 24px 32px 48px;
  }

  /* CATEGORY */
  .category-section {
    margin-bottom: 40px;
  }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #EBBA95;
  }

  .category-title {
    font-size: 18px;
    font-weight: 700;
    color: #4E8D99;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .category-actions {
    display: flex;
    gap: 8px;
  }

  .btn-small {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-small-edit {
    background: #f0f8f9;
    color: #4E8D99;
    border: 1px solid #4E8D99;
  }
  .btn-small-edit:hover { background: #d9eff2; }

  .btn-small-delete {
    background: #fff0f0;
    color: #e74c3c;
    border: 1px solid #e74c3c;
  }
  .btn-small-delete:hover { background: #fdd; }

  /* APP GRID */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }

  /* APP CARD */
  .app-card {
    background: white;
    border-radius: 14px;
    padding: 20px 12px 14px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: relative;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .app-card:hover {
    border-color: #4E8D99;
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(78,141,153,0.2);
  }

  .app-card-menu {
    position: absolute;
    top: 8px;
    right: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .app-card:hover .app-card-menu {
    opacity: 1;
  }

  .app-card-menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #999;
    font-size: 16px;
    padding: 2px 5px;
    border-radius: 4px;
    line-height: 1;
  }
  .app-card-menu-btn:hover { background: #f0f0f0; color: #333; }

  .app-icon-wrap {
    width: 64px;
    height: 64px;
    margin: 0 auto 10px;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    border: 1px solid #eee;
  }

  .app-icon-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .app-icon-fallback {
    width: 64px;
    height: 64px;
    margin: 0 auto 10px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #4E8D99, #6D445E);
    color: white;
    font-size: 24px;
    font-weight: 700;
  }

  .app-name {
    font-size: 12px;
    font-weight: 600;
    color: #333;
    line-height: 1.3;
    word-break: break-word;
  }

  /* DROPDOWN CONTEXT MENU */
  .context-menu {
    position: absolute;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 1000;
    min-width: 140px;
    overflow: hidden;
    display: none;
  }

  .context-menu.show { display: block; }

  .context-menu-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .context-menu-item:hover { background: #f5f5f5; }
  .context-menu-item.danger { color: #e74c3c; }
  .context-menu-item.danger:hover { background: #fff0f0; }

  /* MODAL OVERLAY */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    display: none;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
    color: #4E8D99;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    background: white;
  }
  .form-input:focus, .form-select:focus { border-color: #4E8D99; }

  /* ICON UPLOAD SECTION */
  .icon-section {
    border: 2px dashed #ddd;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    background: #fafafa;
  }

  .icon-preview-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .icon-preview-box {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    border: 2px solid #e0e0e0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    flex-shrink: 0;
  }

  .icon-preview-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .icon-preview-placeholder {
    font-size: 24px;
    color: #bbb;
  }

  .icon-upload-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    text-align: left;
  }

  .icon-option-label {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .icon-url-input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
  }
  .icon-url-input:focus { border-color: #4E8D99; }

  .icon-upload-btn {
    padding: 7px 12px;
    background: #f0f8f9;
    border: 1px solid #4E8D99;
    border-radius: 6px;
    color: #4E8D99;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }
  .icon-upload-btn:hover { background: #d9eff2; }

  .icon-file-input {
    display: none;
  }

  .icon-divider {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin: 4px 0;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #eee;
  }

  /* ADD APP PLACEHOLDER */
  .add-app-card {
    background: white;
    border-radius: 14px;
    padding: 20px 12px 14px;
    text-align: center;
    cursor: pointer;
    border: 2px dashed #ccc;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 110px;
    color: #aaa;
  }
  .add-app-card:hover {
    border-color: #4E8D99;
    color: #4E8D99;
    background: #f0f8f9;
  }
  .add-app-card .plus { font-size: 28px; line-height: 1; }
  .add-app-card .add-label { font-size: 11px; font-weight: 600; margin-top: 6px; }

  /* DRAG AND DROP */
  .app-card.dragging { opacity: 0.4; }
  .app-card.drag-over { border-color: #EBBA95 !important; background: #fffdf9; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #333;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    max-width: 300px;
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }
  .toast.success { background: #27ae60; }
  .toast.error { background: #e74c3c; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .main { padding: 16px 16px 40px; }
    .search-bar { padding: 12px 16px 0; }
    .app-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
  }
</style>
</head>
