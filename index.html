<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moxie Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f8;
    color: #333;
    min-height: 100vh;
  }

  header {
    background: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #EBBA95;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-area img {
    height: 40px;
    object-fit: contain;
  }

  .logo-area h1 {
    font-size: 22px;
    color: #4E8D99;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #4E8D99;
    color: white;
  }

  .btn-primary:hover { background: #3a7a85; }

  .btn-secondary {
    background: #EBBA95;
    color: #6D445E;
  }

  .btn-secondary:hover { background: #e0a87a; }

  .btn-danger {
    background: #e74c3c;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
  }

  .btn-danger:hover { background: #c0392b; }

  .btn-edit {
    background: #4E8D99;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
  }

  .btn-edit:hover { background: #3a7a85; }

  main {
    padding: 30px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .search-bar {
    width: 100%;
    max-width: 500px;
    padding: 10px 16px;
    border: 2px solid #ddd;
    border-radius: 25px;
    font-size: 15px;
    margin-bottom: 28px;
    outline: none;
    transition: border 0.2s;
  }

  .search-bar:focus { border-color: #4E8D99; }

  .category-section {
    margin-bottom: 36px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .category-title {
    font-size: 17px;
    font-weight: 700;
    color: #6D445E;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-add-category {
    background: none;
    border: 2px dashed #4E8D99;
    color: #4E8D99;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }

  .btn-add-category:hover { background: #eaf4f6; }

  .btn-delete-category {
    background: none;
    border: none;
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
    margin-left: auto;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .btn-delete-category:hover { color: #e74c3c; background: #fff0ef; }

  .btn-rename-category {
    background: none;
    border: none;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    padding: 2px 6px;
  }

  .btn-rename-category:hover { color: #4E8D99; }

  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }

  .app-card {
    background: white;
    border-radius: 14px;
    padding: 18px 12px 14px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: all 0.2s;
    position: relative;
    cursor: grab;
    border: 2px solid transparent;
  }

  .app-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(78,141,153,0.18);
    border-color: #4E8D99;
  }

  .app-card.dragging {
    opacity: 0.5;
    cursor: grabbing;
  }

  .app-card-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
    gap: 4px;
    flex-direction: column;
  }

  .app-card:hover .app-card-actions { display: flex; }

  .app-icon-wrapper {
    width: 60px;
    height: 60px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    overflow: hidden;
    background: #f0f0f0;
  }

  .app-icon-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .app-emoji {
    font-size: 36px;
    line-height: 60px;
  }

  .app-name {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-top: 4px;
    word-break: break-word;
  }

  .app-link-overlay {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    z-index: 1;
  }

  .app-card-actions { z-index: 2; }

  /* Drop zone */
  .drop-zone {
    min-height: 80px;
    border: 2px dashed #ccc;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 13px;
    margin-top: 8px;
  }

  .drop-zone.drag-over {
    border-color: #4E8D99;
    background: #eaf4f6;
    color: #4E8D99;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: 18px;
    padding: 32px;
    width: 95%;
    max-width: 480px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    position: relative;
  }

  .modal h2 {
    font-size: 20px;
    color: #4E8D99;
    margin-bottom: 22px;
    font-weight: 700;
  }

  .modal label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    margin-bottom: 5px;
    margin-top: 14px;
  }

  .modal input, .modal select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #ddd;
    border-radius: 9px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }

  .modal input:focus, .modal select:focus { border-color: #4E8D99; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    justify-content: flex-end;
  }

  .btn-close-modal {
    position: absolute;
    top: 14px;
    right: 18px;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #aaa;
  }

  .btn-close-modal:hover { color: #333; }

  .logo-preview {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    border: 2px dashed #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-top: 8px;
    overflow: hidden;
    background: #f8f8f8;
  }

  .logo-preview img { width: 100%; height: 100%; object-fit: contain; }

  .upload-area {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .upload-btn {
    padding: 7px 14px;
    background: #f0f0f0;
    border: 2px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #555;
  }

  .upload-btn:hover { background: #e8e8e8; }

  #file-upload { display: none; }

  .or-divider {
    text-align: center;
    color: #aaa;
    font-size: 12px;
    margin: 8px 0;
  }

  .add-category-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #4E8D99;
    color: white;
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    z-index: 9999;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    main { padding: 20px 16px; }
    header { padding: 12px 16px; }
    .app-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <img id="moxie-logo" src="https://i.imgur.com/placeholder.png" alt="Moxie Logo" onerror="this.style.display='none'">
    <h1>Moxie Dashboard</h1>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="openAddCategoryModal()">+ Category</button>
    <button class="btn btn-primary" onclick="openAddAppModal()">+ Add App</button>
  </div>
</header>

<main>
  <input type="text" class="search-bar" id="search-input" placeholder="🔍 Search apps..." oninput="filterApps()">
  <div id="dashboard"></div>
</main>

<!-- Add/Edit App Modal -->
<div class="modal-overlay" id="app-modal">
  <div class="modal">
    <button class="btn-close-modal" onclick="closeModal('app-modal')">×</button>
    <h2 id="modal-title">Add New App</h2>

    <label>App Name *</label>
    <input type="text" id="app-name-input" placeholder="e.g. Slack">

    <label>URL *</label>
    <input type="url" id="app-url-input" placeholder="https://slack.com">

    <label>Category *</label>
    <select id="app-category-input"></select>

    <label>Logo</label>
    <div class="upload-area">
      <label for="file-upload" class="upload-btn">📁 Upload Image</label>
      <input type="file" id="file-upload" accept="image/*" onchange="handleFileUpload(event)">
      <div class="logo-preview" id="logo-preview"><span>🖼️</span></div>
    </div>
    <div class="or-divider">— or use auto-fetched favicon —</div>
    <input type="url" id="app-icon-url" placeholder="Paste icon URL (optional)">

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('app-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveApp()">Save App</button>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="category-modal">
  <div class="modal">
    <button class="btn-close-modal" onclick="closeModal('category-modal')">×</button>
    <h2>Add New Category</h2>
    <label>Category Name *</label>
    <input type="text" id="category-name-input" placeholder="e.g. Design Tools">
    <label>Emoji Icon</label>
    <input type="text" id="category-emoji-input" placeholder="e.g. 🎨" maxlength="4">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('category-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategory()">Add Category</button>
    </div>
  </div>
</div>

<!-- Rename Category Modal -->
<div class="modal-overlay" id="rename-modal">
  <div class="modal">
    <button class="btn-close-modal" onclick="closeModal('rename-modal')">×</button>
    <h2>Rename Category</h2>
    <label>New Name</label>
    <input type="text" id="rename-name-input" placeholder="Category name">
    <label>Emoji</label>
    <input type="text" id="rename-emoji-input" placeholder="Emoji" maxlength="4">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('rename-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmRename()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DEFAULT DATA
// ============================================================
const DEFAULT_CATEGORIES = [
  { id: 'communication', name: 'Communication', emoji: '📬' },
  { id: 'project', name: 'Project Management', emoji: '📋' },
  { id: 'finance', name: 'Finance', emoji: '💰' },
  { id: 'sales', name: 'Sales & CRM', emoji: '🛒' },
  { id: 'operations', name: 'Operations', emoji: '🔧' },
  { id: 'ai', name: 'AI Tools', emoji: '🤖' },
];

const DEFAULT_APPS = [
  // Communication
  { id: 'gmail', name: 'Gmail', url: 'https://mail.google.com', category: 'communication', icon: 'https://www.google.com/favicon.ico', useGoogle: true },
  { id: 'slack', name: 'Slack', url: 'https://slack.com', category: 'communication', icon: '' },
  { id: 'meet', name: 'Google Meet', url: 'https://meet.google.com', category: 'communication', icon: '' },
  { id: 'loom', name: 'Loom', url: 'https://www.loom.com', category: 'communication', icon: '' },
  { id: 'fathom', name: 'Fathom', url: 'https://fathom.video/home', category: 'communication', icon: '' },

  // Project Management
  { id: 'asana', name: 'Asana', url: 'https://app.asana.com/1/1203386861136560/home', category: 'project', icon: '' },
  { id: 'notion', name: 'Notion', url: 'https://www.notion.so/moxie-docs/6060ef49fea04dc3a1dc0a32d0564233', category: 'project', icon: '' },
  { id: 'arrows', name: 'Arrows', url: 'https://success.joinmoxie.com/home', category: 'project', icon: '' },
  { id: 'gcal', name: 'Google Calendar', url: 'https://calendar.google.com', category: 'project', icon: '' },
  { id: 'gsheets', name: 'Google Sheets', url: 'https://sheets.google.com', category: 'project', icon: '' },

  // Finance
  { id: 'ramp', name: 'Ramp', url: 'https://app.ramp.com/sign-in', category: 'finance', icon: '' },
  { id: 'stripe', name: 'Stripe', url: 'https://dashboard.stripe.com', category: 'finance', icon: '' },
  { id: 'justworks', name: 'JustWorks', url: 'https://payroll.justworks.com/account/vouchers', category: 'finance', icon: '' },

  // Sales & CRM
  { id: 'hubspot', name: 'HubSpot', url: 'https://app.hubspot.com/login', category: 'sales', icon: '' },
  { id: 'shopify', name: 'Shopify', url: 'https://admin.shopify.com/store/moxie-9681', category: 'sales', icon: '' },

  // Operations
  { id: '1password', name: '1Password', url: 'https://my.1password.com', category: 'operations', icon: '' },
  { id: 'omni', name: 'Omni', url: 'https://moxie.omniapp.co', category: 'operations', icon: '' },
  { id: 'glean', name: 'Glean', url: 'https://app.glean.com', category: 'operations', icon: '' },
  { id: 'dropbox', name: 'Dropbox Sign', url: 'https://app.hellosign.com/account/logIn', category: 'operations', icon: '' },
  { id: 'zapier', name: 'Zapier', url: 'https://zapier.com', category: 'operations', icon: '' },
  { id: 'github', name: 'GitHub', url: 'https://jenniferdenton-droid.github.io/Moxie-Dashboard/', category: 'operations', icon: '' },
  { id: 'moxieadmin', name: 'Moxie Admin', url: 'https://api.prod.internal.joinmoxie.com/admin/login/', category: 'operations', icon: '' },

  // AI
  { id: 'chatgpt', name: 'ChatGPT', url: 'https://chatgpt.com', category: 'ai', icon: '' },
];

// ============================================================
// STATE
// ============================================================
let categories = [];
let apps = [];
let editingAppId = null;
let renamingCategoryId = null;
let draggedAppId = null;
let uploadedIconData = null;

// ============================================================
// INIT
// ============================================================
function init() {
  const savedCats = localStorage.getItem('moxie_categories');
  const savedApps = localStorage.getItem('moxie_apps');

  if (savedCats) {
    categories = JSON.parse(savedCats);
  } else {
    categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    saveData();
  }

  if (savedApps) {
    apps = JSON.parse(savedApps);
  } else {
    apps = JSON.parse(JSON.stringify(DEFAULT_APPS));
    saveData();
  }

  render();
}

function saveData() {
  localStorage.setItem('moxie_categories', JSON.stringify(categories));
  localStorage.setItem('moxie_apps', JSON.stringify(apps));
}

// ============================================================
// FAVICON HELPER
// ============================================================
function getIconUrl(app) {
  if (app.icon && app.icon.trim() !== '') return app.icon;
  try {
    const domain = new URL(app.url).origin;
    return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  } catch(e) {
    return '';
  }
}

// ============================================================
// RENDER
// ============================================================
function render(filter = '') {
  const dashboard = document.getElementById('dashboard');
  dashboard.innerHTML = '';

  categories.forEach(cat => {
    const catApps = apps.filter(a =>
      a.category === cat.id &&
      (filter === '' ||
       a.name.toLowerCase().includes(filter.toLowerCase()))
    );

    if (filter !== '' && catApps.length === 0) return;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.dataset.categoryId = cat.id;

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <span class="category-title">${cat.emoji || ''} ${cat.name}</span>
      <button class="btn-rename-category" title="Rename" onclick="openRenameModal('${cat.id}')">✏️</button>
      <button class="btn-delete-category" title="Delete category" onclick="deleteCategory('${cat.id}')">✕</button>
    `;

    const grid = document.createElement('div');
    grid.className = 'app-grid';
    grid.dataset.categoryId = cat.id;
    grid.addEventListener('dragover', onDragOver);
    grid.addEventListener('drop', onDrop);

    catApps.forEach(app => {
      const card = createAppCard(app);
      grid.appendChild(card);
    });

    const dropZone = document.createElement('div');
    dropZone.className = 'drop-zone';
    dropZone.dataset.categoryId = cat.id;
    dropZone.textContent = 'Drop app here';
    dropZone.addEventListener('dragover', onDragOver);
    dropZone.addEventListener('drop', onDrop);

    section.appendChild(header);
    section.appendChild(grid);
    if (filter === '') section.appendChild(dropZone);
    dashboard.appendChild(section);
  });
}

function createAppCard(app) {
  const card = document.createElement('div');
  card.className = 'app-card';
  card.draggable = true;
  card.dataset.appId = app.id;

  card.addEventListener('dragstart', () => {
    draggedAppId = app.id;
    setTimeout(() => card.classList.add('dragging'), 0);
  });

  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.drop-zone, .app-grid').forEach(el => {
      el.classList.remove('drag-over');
    });
  });

  const iconUrl = getIconUrl(app);
  const iconHtml = iconUrl
    ? `<img src="${iconUrl}" alt="${app.name}" onerror="this.parentElement.innerHTML='<span class=\\"app-emoji\\">🔗</span>'">`
    : `<span class="app-emoji">🔗</span>`;

  card.innerHTML = `
    <div class="app-card-actions">
      <button class="btn btn-edit" onclick="openEditAppModal('${app.id}')">✏️</button>
      <button class="btn btn-danger" onclick="deleteApp('${app.id}')">✕</button>
    </div>
    <a href="${app.url}" target="_blank" class="app-link-overlay" title="${app.name}"></a>
    <div class="app-icon-wrapper">${iconHtml}</div>
    <div class="app-name">${app.name}</div>
  `;

  return card;
}

// ============================================================
// DRAG & DROP
// ============================================================
function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');

  const targetCatId = e.currentTarget.dataset.categoryId;
  if (!draggedAppId || !targetCatId) return;

  const appIdx = apps.findIndex(a => a.id === draggedAppId);
  if (appIdx === -1) return;

  apps[appIdx].category = targetCatId;
  saveData();
  showToast(`Moved to ${categories.find(c => c.id === targetCatId)?.name}`);
  render(document.getElementById('search-input').value);
  draggedAppId = null;
}

// ============================================================
// SEARCH
// ============================================================
function filterApps() {
  const q = document.getElementById('search-input').value;
  render(q);
}

// ============================================================
// MODALS
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
  if (id === 'app-modal') {
    editingAppId = null;
    uploadedIconData = null;
    document.getElementById('logo-preview').innerHTML = '<span>🖼️</span>';
    document.getElementById('app-name-input').value = '';
    document.getElementById('app-url-input').value = '';
    document.getElementById('app-icon-url').value = '';
    document.getElementById('modal-title').textContent = 'Add New App';
  }
}

function openAddAppModal() {
  editingAppId = null;
  uploadedIconData = null;
  document.getElementById('modal-title').textContent = 'Add New App';
  document.getElementById('app-name-input').value = '';
  document.getElementById('app-url-input').value = '';
  document.getElementById('app-icon-url').value = '';
  document.getElementById('logo-preview').innerHTML = '<span>🖼️</span>';
  populateCategorySelect();
  openModal('app-modal');
}

function openEditAppModal(appId) {
  const app = apps.find(a => a.id === appId);
  if (!app) return;

  editingAppId = appId;
  uploadedIconData = null;
  document.getElementById('modal-title').textContent = 'Edit App';
  document.getElementById('app-name-input').value = app.name;
  document.getElementById('app-url-input').value = app.url;
  document.getElementById('app-icon-url').value = app.icon || '';

  const preview = document.getElementById('logo-preview');
  const iconUrl = getIconUrl(app);
  if (iconUrl) {
    preview.innerHTML = `<img src="${iconUrl}" onerror="this.parentElement.innerHTML='<span>🖼️</span>'">`;
  } else {
    preview.innerHTML = '<span>🖼️</span>';
  }

  populateCategorySelect(app.category);
  openModal('app-modal');
}

function populateCategorySelect(selected = '') {
  const sel = document.getElementById('app-category-input');
  sel.innerHTML = categories.map(c =>
    `<option value="${c.id}" ${c.id === selected ? 'selected' : ''}>${c.emoji} ${c.name}</option>`
  ).join('');
}

function openAddCategoryModal() {
  document.getElementById('category-name-input').value = '';
  document.getElementById('category-emoji-input').value = '';
  openModal('category-modal');
}

function openRenameModal(catId) {
  renamingCategoryId = catId;
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  document.getElementById('rename-name-input').value = cat.name;
  document.getElementById('rename-emoji-input').value = cat.emoji || '';
  openModal('rename-modal');
}

function confirmRename() {
  const cat = categories.find(c => c.id === renamingCategoryId);
  if (!cat) return;
  const newName = document.getElementById('rename-name-input').value.trim();
  const newEmoji = document.getElementById('rename-emoji-input').value.trim();
  if (!newName) { alert('Please enter a name.'); return; }
  cat.name = newName;
  cat.emoji = newEmoji;
  saveData();
  closeModal('rename-modal');
  render(document.getElementById('search-input').value);
  showToast('Category renamed!');
}

// ============================================================
// SAVE APP
// ============================================================
function saveApp() {
  const name = document.getElementById('app-name-input').value.trim();
  const url = document.getElementById('app-url-input').value.trim();
  const category = document.getElementById('app-category-input').value;
  const iconUrl = document.getElementById('app-icon-url').value.trim();

  if (!name || !url) { alert('App name and URL are required.'); return; }

  let icon = '';
  if (uploadedIconData) {
    icon = uploadedIconData;
  } else if (iconUrl) {
    icon = iconUrl;
  }

  if (editingAppId) {
    const idx = apps.findIndex(a => a.id === editingAppId);
    if (idx !== -1) {
      apps[idx] = { ...apps[idx], name, url, category, icon };
    }
    showToast('App updated!');
  } else {
    const newApp = {
      id: 'app_' + Date.now(),
      name, url, category, icon
    };
    apps.push(newApp);
    showToast('App added!');
  }

  saveData();
  closeModal('app-modal');
  render(document.getElementById('search-input').value);
}

// ============================================================
// SAVE CATEGORY
// ============================================================
function saveCategory() {
  const name = document.getElementById('category-name-input').value.trim();
  const emoji = document.getElementById('category-emoji-input').value.trim();
  if (!name) { alert('Category name is required.'); return; }

  const id = 'cat_' + Date.now();
  categories.push({ id, name, emoji });
  saveData();
  closeModal('category-modal');
  render(document.getElementById('search-input').value);
  showToast('Category added!');
}

// ============================================================
// DELETE
// ============================================================
function deleteApp(appId) {
  if (!confirm('Delete this app?')) return;
  apps = apps.filter(a => a.id !== appId);
  saveData();
  render(document.getElementById('search-input').value);
  showToast('App removed.');
}

function deleteCategory(catId) {
  const catApps = apps.filter(a => a.category === catId);
  if (catApps.length > 0) {
    if (!confirm(`This category has ${catApps.length} app(s). Delete category and all its apps?`)) return;
    apps = apps.filter(a => a.category !== catId);
  } else {
    if (!confirm('Delete this category?')) return;
  }
  categories = categories.filter(c => c.id !== catId);
  saveData();
  render(document.getElementById('search-input').value);
  showToast('Category deleted.');
}

// ============================================================
// FILE UPLOAD
// ============================================================
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    uploadedIconData = e.target.result;
    const preview = document.getElementById('logo-preview');
    preview.innerHTML = `<img src="${uploadedIconData}" style="width:100%;height:100%;object-fit:contain;">`;
  };
  reader.readAsDataURL(file);
}

// Live preview of icon URL
document.addEventListener('DOMContentLoaded', () => {
  const iconInput = document.getElementById('app-icon-url');
  iconInput.addEventListener('input', () => {
    const url = iconInput.value.trim();
    const preview = document.getElementById('logo-preview');
    if (url) {
      preview.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='<span>🖼️</span>'" style="width:100%;height:100%;object-fit:contain;">`;
    } else {
      preview.innerHTML = '<span>🖼️</span>';
    }
  });
});

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
